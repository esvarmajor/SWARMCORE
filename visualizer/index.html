<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SWARMCORE // multi-agent reasoning trace</title>
<meta name="description" content="SWARMCORE — a replayable visualization of a real multi-agent AI reasoning trace. A human face materializes out of a field of living code as three Claude sub-agents research, analyze, and write." />
<meta property="og:title" content="SWARMCORE — a face made of code" />
<meta property="og:description" content="A real multi-agent AI reasoning trace, replayed as a typographic portrait: the face resolves out of the code as the agents work." />
<meta property="og:type" content="website" />
<meta property="og:image" content="https://raw.githubusercontent.com/esvarmajor/SWARMCORE/main/docs/og.png" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="SWARMCORE — a face made of code" />
<meta name="twitter:description" content="A real multi-agent AI reasoning trace, replayed as a face made of living code." />
<meta name="twitter:image" content="https://raw.githubusercontent.com/esvarmajor/SWARMCORE/main/docs/og.png" />
<style>
  :root{
    /* the FRAME is hue-neutral graphite so the face's traveling jewel-hue is the
       only chroma on screen; JS recolours the live UI to the active state. */
    --core:#4a9cff;        /* resting blue (= FOCUS home hue) */
    --chrome-teal:#aebfd6; /* cool-neutral secondary accent   */
    --amber:#ffbe3d;       /* warning / checkpoint            */
    --breach:#ff3b3b;      /* alert / breach red              */
    --chrome:#dfe9e6;      /* chrome highlight                */
    --ink:#8ea0b8;         /* dim terminal text (cool grey)   */
    --neutral:150,170,200; /* cool-neutral rgb for frame lines */
    --bg0:#04060c;
    --bg1:#070b12;
    --mono:"JetBrains Mono","IBM Plex Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:
      radial-gradient(ellipse 120% 90% at 45% 34%, #0a0e14 0%, var(--bg1) 44%, var(--bg0) 100%);
    color:var(--chrome-teal);
    font-family:var(--mono);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  /* faint fixed circuit-board texture (neutral, so it never fights the face hue) */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.04;
    background-image:
      linear-gradient(0deg,transparent 0 23px,rgba(150,170,200,.5) 23px 24px),
      linear-gradient(90deg,transparent 0 23px,rgba(150,170,200,.5) 23px 24px);
    background-size:24px 24px,24px 24px;
  }
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
    background:radial-gradient(ellipse 78% 74% at 46% 44%, transparent 52%, rgba(0,0,0,.78) 100%);
  }

  #app{position:relative;z-index:2;display:flex;height:100vh;width:100vw}
  #stage{position:relative;flex:1 1 auto;min-width:0;overflow:hidden}
  canvas#face{position:absolute;inset:0;width:100%;height:100%;display:block}

  /* ---- HUD header ---- */
  #hud{
    position:absolute;top:0;left:0;right:0;z-index:5;
    display:flex;align-items:center;gap:18px;padding:16px 22px;
    background:linear-gradient(180deg, rgba(3,8,7,.9) 0%, rgba(3,8,7,0) 100%);
    pointer-events:none;
  }
  #hud .brand{
    font-weight:700;letter-spacing:.42em;font-size:15px;color:var(--core);
    text-shadow:0 0 12px rgba(150,170,200,.6);white-space:nowrap;
  }
  #hud .brand .tick{color:var(--chrome);opacity:.5;font-weight:400}
  #hud .task{
    flex:1 1 auto;min-width:0;font-size:12.5px;color:var(--ink);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.02em;
  }
  #hud .task b{color:var(--chrome-teal);font-weight:400}
  #hud .clock{font-size:13px;color:var(--chrome);opacity:.85;letter-spacing:.08em;font-variant-numeric:tabular-nums}
  #status{
    font-size:11.5px;font-weight:700;letter-spacing:.24em;padding:6px 13px;border-radius:2px;
    border:1px solid currentColor;white-space:nowrap;color:var(--core);
    box-shadow:0 0 14px rgba(150,170,200,.25) inset;transition:color .35s ease, box-shadow .35s ease;
  }
  #status.await{color:var(--amber);box-shadow:0 0 16px rgba(255,190,61,.3) inset}
  #status.done{color:var(--chrome-teal);box-shadow:0 0 16px rgba(150,170,200,.28) inset}

  /* ---- terminal side panel ---- */
  #terminal{
    position:relative;flex:0 0 380px;max-width:42vw;
    background:linear-gradient(180deg, rgba(4,11,9,.92), rgba(3,7,6,.96));
    border-left:1px solid rgba(150,170,200,.16);
    box-shadow:-24px 0 60px -30px rgba(0,0,0,.8), inset 1px 0 0 rgba(150,170,200,.08);
    display:flex;flex-direction:column;overflow:hidden;
  }
  #terminal .thead{
    padding:14px 16px 10px;border-bottom:1px solid rgba(150,170,200,.12);
    font-size:10.5px;letter-spacing:.28em;color:var(--core);
    display:flex;justify-content:space-between;align-items:center;
    text-shadow:0 0 10px rgba(150,170,200,.4);
  }
  #terminal .thead .dot{width:7px;height:7px;border-radius:50%;background:var(--core);
    box-shadow:0 0 8px var(--core);animation:pulseDot 1.4s ease-in-out infinite}
  @keyframes pulseDot{0%,100%{opacity:.35}50%{opacity:1}}
  #log{
    flex:1 1 auto;overflow:hidden;padding:12px 16px 8px;
    font-size:12px;line-height:1.5;color:var(--ink);
    display:flex;flex-direction:column;justify-content:flex-end;gap:2px;
  }
  #log .line{opacity:0;transform:translateY(6px);animation:lineIn .32s ease forwards}
  @keyframes lineIn{to{opacity:1;transform:none}}
  #log .tag{font-weight:700;letter-spacing:.06em}
  #log .t-research{color:var(--chrome-teal)}
  #log .t-analyze{color:#b8f7ff}
  #log .t-write{color:var(--core)}
  #log .t-orch{color:var(--chrome)}
  #log .call{color:var(--chrome-teal)}
  #log .result{color:var(--ink)}
  #log .out{color:var(--core);text-shadow:0 0 8px rgba(150,170,200,.35)}
  #log .muted{color:#5f7d75}
  #log .cp{
    display:block;margin:6px 0;padding:8px 10px;border:1px solid rgba(255,190,61,.5);
    border-left:3px solid var(--amber);background:rgba(255,190,61,.06);
    color:var(--amber);white-space:pre-wrap;font-size:11.5px;line-height:1.45;
    box-shadow:0 0 18px rgba(255,190,61,.12) inset;
  }
  #log .cp .k{color:#ffd98a}
  #cursor{color:var(--core);animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  #terminal::after{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:3;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.16) 2px 3px);
    mix-blend-mode:multiply;opacity:.5;
  }

  /* full-canvas scanline sweep (checkpoint) */
  #sweep{
    position:absolute;inset:0;z-index:6;pointer-events:none;opacity:0;
    background:linear-gradient(90deg, transparent 0%, rgba(255,190,61,.02) 40%,
      rgba(255,190,61,.16) 49%, rgba(255,214,138,.5) 50%, rgba(255,190,61,.16) 51%,
      rgba(255,190,61,.02) 60%, transparent 100%);
    transform:translateX(-100%);mix-blend-mode:screen;
  }
  #sweep.run{animation:sweep 1.25s cubic-bezier(.4,0,.2,1) 1}
  @keyframes sweep{0%{opacity:0;transform:translateX(-100%)}8%{opacity:1}
    92%{opacity:1}100%{opacity:0;transform:translateX(100%)}}

  /* chromatic-aberration glitch on state transitions */
  #stage.glitch canvas#face{animation:aberr .34s steps(2) 2}
  @keyframes aberr{
    0%{filter:none}
    50%{filter:drop-shadow(2px 0 0 rgba(255,59,59,.6)) drop-shadow(-2px 0 0 rgba(60,180,255,.6))}
    100%{filter:none}
  }

  /* ---- controls ---- */
  #controls{
    position:absolute;left:50%;bottom:22px;transform:translateX(-50%);z-index:7;
    display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:4px;
    background:rgba(4,11,9,.72);border:1px solid rgba(150,170,200,.18);
    box-shadow:0 8px 30px -12px rgba(0,0,0,.7), inset 0 0 20px rgba(150,170,200,.05);
    backdrop-filter:blur(3px);
  }
  #controls button{
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;font-weight:700;
    color:var(--chrome-teal);background:transparent;
    border:1px solid rgba(150,170,200,.28);border-radius:3px;
    padding:7px 12px;cursor:pointer;transition:all .18s ease;min-width:44px;
  }
  #controls button:hover{color:var(--core);border-color:var(--core);
    box-shadow:0 0 12px rgba(150,170,200,.3);background:rgba(150,170,200,.06)}
  #controls button:active{transform:translateY(1px)}
  #controls .sep{width:1px;height:20px;background:rgba(150,170,200,.18)}
  #controls .lbl{font-size:9.5px;letter-spacing:.2em;color:#5f7d75;padding-left:2px}

  /* controls + scrubber fade away when the viewer goes idle (clean recording) */
  #controls{transition:opacity .5s ease}
  body.idle #controls{opacity:0;pointer-events:none}
  body.idle #stage{cursor:none}

  /* ---- timeline scrubber ---- */
  #scrub{
    position:absolute;left:0;right:0;bottom:0;height:16px;z-index:8;cursor:pointer;
    transition:opacity .5s ease;touch-action:none;
  }
  body.idle #scrub{opacity:.3}
  #scrub .track{
    position:absolute;left:0;right:0;bottom:0;height:3px;
    background:rgba(150,170,200,.13);transition:height .15s ease;
  }
  #scrub .fill{
    position:absolute;left:0;bottom:0;height:3px;width:0%;
    background:var(--core);box-shadow:0 0 10px rgba(150,170,200,.45);
    transition:height .15s ease;
  }
  #scrub:hover .track,#scrub:hover .fill,#scrub.drag .track,#scrub.drag .fill{height:7px}

  /* ---- toast + drag-drop hint ---- */
  #toast{
    position:absolute;top:60px;left:50%;transform:translateX(-50%);z-index:9;
    padding:8px 14px;border-radius:3px;font-size:11px;letter-spacing:.14em;
    color:var(--chrome-teal);background:rgba(4,11,9,.85);
    border:1px solid rgba(150,170,200,.3);pointer-events:none;
    opacity:0;transition:opacity .3s ease;white-space:nowrap;max-width:80%;
    overflow:hidden;text-overflow:ellipsis;
  }
  #toast.show{opacity:1}
  #toast.err{color:var(--breach);border-color:rgba(255,59,59,.5)}
  #dropHint{
    position:absolute;inset:14px;z-index:9;display:none;align-items:center;justify-content:center;
    border:1px dashed rgba(150,170,200,.55);border-radius:8px;pointer-events:none;
    font-size:12.5px;letter-spacing:.22em;color:var(--chrome);
    background:rgba(4,6,12,.6);backdrop-filter:blur(2px);
  }
  body.dragging #dropHint{display:flex}

  /* ?rec — recording mode: pure canvas + HUD + terminal, zero chrome */
  body.rec #controls,body.rec #scrub,body.rec #toast{display:none}

  /* ---- affect console — DEBUG INSTRUMENT ONLY (hidden from viewers).
         show with ?debug in the URL or the D key. ---- */
  #affect{
    position:absolute;top:56px;right:16px;z-index:6;width:196px;
    padding:9px 10px 8px;border-radius:4px;pointer-events:none;
    background:rgba(4,11,9,.60);border:1px solid rgba(150,170,200,.16);
    box-shadow:0 8px 30px -14px rgba(0,0,0,.7), inset 0 0 18px rgba(150,170,200,.04);
    backdrop-filter:blur(3px);
    display:none;
  }
  body.debug #affect{display:block}
  #affect .ahead{
    display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;
    font-size:9px;letter-spacing:.3em;color:#5f7d75;
  }
  #affect .ahead .mood{
    font-weight:700;letter-spacing:.16em;font-size:12px;color:var(--core);
    text-shadow:0 0 8px rgba(150,170,200,.5);transition:color .3s ease,text-shadow .3s ease;
  }
  #affect .nums{
    font-size:9.5px;letter-spacing:.05em;color:#6f978b;margin-bottom:6px;
    font-variant-numeric:tabular-nums;
  }
  #affect .nums b{color:var(--chrome-teal);font-weight:400}
  canvas#eeg{display:block;width:176px;height:64px}

  @media (max-width:820px){
    #affect{top:auto;bottom:74px;right:10px;width:170px}
    canvas#eeg{width:150px}
    #app{flex-direction:column}
    #terminal{flex:0 0 40%;max-width:none;border-left:none;border-top:1px solid rgba(150,170,200,.16)}
  }
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <canvas id="face"></canvas>
    <div id="hud">
      <div class="brand">SWARMCORE<span class="tick"> ◇ </span></div>
      <div class="task" id="taskLine">—</div>
      <div class="clock" id="clock">00:00.0</div>
      <div id="status">INITIALIZING</div>
    </div>
    <div id="affect">
      <div class="ahead"><span>AFFECT ▸ STATE</span><span class="mood" id="moodWord">FOCUS</span></div>
      <div class="nums">AROUSAL <b id="arVal">45</b> &nbsp;·&nbsp; VALENCE <b id="vaVal">+.10</b></div>
      <canvas id="eeg"></canvas>
    </div>
    <div id="sweep"></div>
    <div id="controls">
      <button id="btnPlay" title="Space">❚❚ PAUSE</button>
      <button id="btnRestart" title="R">⟲ RESTART</button>
      <span class="sep"></span>
      <button id="btnSpeed" title="1 / 2">1×</button>
      <span class="lbl">SPEED</span>
    </div>
    <div id="scrub"><div class="track"></div><div class="fill"></div></div>
    <div id="toast"></div>
    <div id="dropHint">DROP A trace.json TO REPLAY IT</div>
  </div>
  <div id="terminal">
    <div class="thead"><span>READOUT ▐ AGENT TELEMETRY</span><span class="dot"></span></div>
    <div id="log"></div>
  </div>
</div>

<script>
"use strict";
(function(){

function boot(trace){ try { new Swarmcore(trace).start(); } catch(e){ showError(e); } }
function showError(e){
  document.getElementById("log").innerHTML =
    '<div class="line" style="color:var(--breach)">TRACE LOAD ERROR: '+
    String(e && e.message || e)+'</div>';
  console.error(e);
}

// ------------------------------------------------------------- helpers
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function smooth(x){ x=clamp(x,0,1); return x*x*(3-2*x); }
function lerp(a,b,t){ return a+(b-a)*t; }
var CHARS="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>/\\|{}[]#*+=~:;$%&".split("");
function esc(s){ return String(s==null?"":s)
  .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function clip(s,n){ s=String(s==null?"":s); return s.length>n?s.slice(0,n-1)+"…":s; }

// pacing (ms of trace time per step type) + hold/loop
var DUR={reasoning:1000,reasoningFinal:1600,tool_call:1250,tool_result:1250,checkpoint:2900};
var END_HOLD=3200;   // room for the resolve aurora + gold flare finale

var FONT='JetBrains Mono,IBM Plex Mono,ui-monospace,Menlo,monospace';
var EEG_N=140;          // EEG ring-buffer sample count
var INTAKE_MAX=6;       // max keyword tokens in flight at once

// ---- emotional / cognitive states (the "LIMBIC BUS") --------------------
// Each state is a preset the renderer EASES toward — never a hard repaint.
//   core = the field colour   ·   glow = the highlight target for lit cells
// Motion scalars (churn/breath/seek/doubt/freeze/tremor) let a viewer read
// the state through MOTION as well as hue (colour is never the sole channel).
// FULL-WHEEL emotion-logic palette. One state is ever active, so the FACE is a
// single jewel-hue at any instant that travels the wheel over the run. HARMONY
// ("one material"): every core sits in a tight S/V band and every glow is that
// same hue pulled to a near-white, so the brightest filaments of ANY state bloom
// to their OWN tinted-white (see the symmetric lerp in drawFace).
//   FOCUS blue (calm/home) · SEEK cyan (reach) · SYNTH green (insight) ·
//   DOUBT violet (unease) · ALERT red (attention) · RESOLVE gold→white (done)
var STATE={
  focus:     {label:"FOCUS", ch:"F", core:[56,132,255],  glow:[206,224,255], pulse:[110,165,255], warmth: 0.00, churn:1.00, bHz:0.80, bAmp:0.050, arousal:45, valence: 0.10},
  seek:      {label:"SEEK",  ch:"S", core:[44,209,242],  glow:[199,246,255], pulse:[97,229,255],  warmth:-0.15, churn:1.30, bHz:0.75, bAmp:0.045, arousal:60, valence: 0.20, seek:1},
  synthesis: {label:"SYNTH", ch:"Y", core:[52,232,150],  glow:[206,255,228], pulse:[110,255,190], warmth:-0.25, churn:0.60, bHz:0.80, bAmp:0.050, arousal:55, valence: 0.60, collapse:1},
  doubt:     {label:"DOUBT", ch:"D", core:[150,72,240],  glow:[221,201,255], pulse:[178,120,255], warmth: 0.10, churn:1.55, bHz:1.30, bAmp:0.038, arousal:70, valence:-0.42, doubt:1},
  alert:     {label:"ALERT", ch:"A", core:[250,64,35],   glow:[255,189,179], pulse:[255,109,87],  warmth: 0.90, churn:1.10, bHz:2.10, bAmp:0.020, arousal:92, valence:-0.60, tremor:1},
  resolve:   {label:"RSLV",  ch:"R", core:[255,227,115], glow:[255,250,230], pulse:[255,235,153], warmth:-0.10, churn:0.12, bHz:0.55, bAmp:0.070, arousal:45, valence: 0.90, freeze:1}
};
var BUS=["focus","seek","synthesis","doubt","alert","resolve"];  // F·S·Y·D·A·R
// AURORA[6] — the six cores in state order, for the resolve rainbow-sweep finale
var AURORA=[STATE.focus.core,STATE.seek.core,STATE.synthesis.core,STATE.doubt.core,STATE.alert.core,STATE.resolve.core];
var EMBER=[150,30,72];   // doubt: shadow-only DEEP-CRIMSON furrow (harmonizes w/ violet, never a 2nd hue)

// per-state FACIAL EXPRESSION — offsets applied to the dark features (brow /
// eyes / mouth / furrow) so the mask morphs into an expression. Head geometry
// (cranium/jaw/cheeks) is shared, so only the face "emotes", it doesn't wobble.
//   brow: vertical brow+eye shift (- up / + down)   furrow: 0..1 inner-brow crease
//   eyeOpen: dark-socket height (squint<1 / wide>1)  eyeW: socket width
//   mouthCurve: corner lift (+ smile / - frown)      mouthOpen: mouth-gap height
// 18-parameter expression per state — a real face, not soft blobs.
//  browY: brow+eye vertical shift   browTilt: +raise OUTER (arch) / -raise INNER (worry)
//  furrow: glabella crease  lidUpper/lidLower: lids slide shut / squint up
//  eyeOpen/eyeW: socket size   gazeX/gazeY: pupil offset   cheekRaise: Duchenne lift
//  jawDrop/mouthOpen: gap   mouthCurve: +smile/-frown   mouthWidth   headTilt/headTurn
//  headRoll: WHOLE-HEAD rotation about the neck (cranium + features together) —
//    the "curious tilt" when the swarm asks its human for guidance
//  asym: constant unevenness so the face is never a dead mirror
// Poised by default: the resting face is a calm, level gaze — composed, not
// hostile; joy is a soft knowing smile; doubt narrows; alert is attentive.
var EXPR={
  focus:     {browY: 0.002, browTilt:-0.04, browThick:0.40,furrow:0.0, lidUpper:0.14, lidLower:0.10, eyeOpen:1.00, eyeW:1.00, gazeX: 0.00, gazeY: 0.00, cheekRaise:0.06, jawDrop:0.00, mouthCurve: 0.004, mouthOpen:0.88, mouthWidth:1.00, headTilt:-0.008, headTurn: 0.00, headRoll:0.00, asym:0.04},
  seek:      {browY:-0.010, browTilt: 0.08, browThick:0.38,furrow:0.0, lidUpper:0.10, lidLower:0.06, eyeOpen:1.06, eyeW:1.04, gazeX: 0.50, gazeY:-0.04, cheekRaise:0.08, jawDrop:0.02, mouthCurve: 0.012, mouthOpen:0.95, mouthWidth:0.99, headTilt: 0.028, headTurn: 0.025,headRoll:0.00, asym:0.04},
  synthesis: {browY:-0.006, browTilt: 0.07, browThick:0.38,furrow:0.0, lidUpper:0.14, lidLower:0.34, eyeOpen:0.88, eyeW:1.00, gazeX: 0.05, gazeY:-0.03, cheekRaise:0.35, jawDrop:0.00, mouthCurve: 0.034, mouthOpen:0.95, mouthWidth:1.03, headTilt:-0.015, headTurn: 0.00, headRoll:0.00, asym:0.10},
  doubt:     {browY: 0.012, browTilt:-0.28, browThick:0.55,furrow:1.0, lidUpper:0.32, lidLower:0.24, eyeOpen:0.66, eyeW:0.96, gazeX:-0.34, gazeY: 0.08, cheekRaise:0.00, jawDrop:0.00, mouthCurve:-0.008, mouthOpen:0.78, mouthWidth:0.94, headTilt:-0.040, headTurn:-0.02, headRoll:0.00, asym:0.09},
  // ALERT = the human-steering checkpoint: a curious head-tilt — wide
  // attentive eyes, arched brows, lips barely parted. Listening, not gasping.
  alert:     {browY:-0.022, browTilt: 0.13, browThick:0.34,furrow:0.10, lidUpper:0.02, lidLower:0.02, eyeOpen:1.24, eyeW:1.10, gazeX: 0.15, gazeY:-0.05, cheekRaise:0.05, jawDrop:0.08, mouthCurve: 0.006, mouthOpen:1.24, mouthWidth:0.96, headTilt: 0.015, headTurn: 0.02, headRoll:0.10, asym:0.04},
  resolve:   {browY:-0.002, browTilt: 0.02, browThick:0.34,furrow:0.0, lidUpper:0.30, lidLower:0.26, eyeOpen:0.90, eyeW:1.00, gazeX: 0.00, gazeY:-0.04, cheekRaise:0.30, jawDrop:0.00, mouthCurve: 0.038, mouthOpen:0.95, mouthWidth:1.02, headTilt: 0.000, headTurn: 0.00, headRoll:0.00, asym:0.08}
};
// NECK-ROLL keyframes for INTENSIVE THINKING — the head slowly circles about
// the neck (roll + a slight turn), like someone loosening up over a hard
// problem. Built from the focus expression at setup; stepped through in tick().
var ROLL_KEYS=12, ROLL_AMP=0.08, ROLL_MS=2200;
function rollExpr(p){                        // p in [0,1) around the cycle
  var e={}, base=EXPR.focus;
  for(var k in base) e[k]=base[k];
  e.headRoll=ROLL_AMP*Math.sin(p*6.2832);
  e.headTurn=base.headTurn + 0.045*(Math.cos(p*6.2832)-1);
  e.gazeY=base.gazeY+0.10;                   // eyes drop slightly — inward thought
  e.lidUpper=0.22;
  return e;
}

// tool identity colours for the labeled pulses (distinct from the emotion hues,
// so PULSE = which tool, FACE = how it feels — two separate channels).
var TOOL_COLORS={
  web_search:       [104,196,255],   // ice-blue
  knowledge_lookup: [190,138,255],   // violet
  steering:         [255,190,61],    // amber (human checkpoint)
  _default:         [127,255,212]    // chrome-teal
};
function toolColor(name){ return TOOL_COLORS[name] || TOOL_COLORS._default; }
// tool glow = the same symmetric core→glow lerp the states use (one material),
// so a tool hue blooms to its OWN tinted white instead of skewing
function toolGlow(c){ return [lerp(c[0],255,0.72)|0, lerp(c[1],255,0.72)|0, lerp(c[2],255,0.72)|0]; }
var DOUBT_RE=/doesn'?t match|data[- ]quality|discrepan|contradict|mismatch|I notice|however,|but the|ambigu|unclear|caveat|conflict|uncertain|\bflag\b|unsubstantiated|not supported/i;
var MISS_RE=/no .*(entry|result|match|knowledge)|not found|unavailable|missing|failed|empty/i;
var STOPWORDS={JSON:1,NULL:1,TRUE:1,FALSE:1,HTTP:1,HTTPS:1,THIS:1,THAT:1,WITH:1,FROM:1,INTO:1,YOUR:1,HAVE:1,WILL:1,QUERY:1,INPUT:1,NAME:1,TYPE:1,KEY:1,TEXT:1,ROLE:1,STEP:1};

// deterministic LCG so keyword flights replay byte-identically for recording
function lcg(seed){ var s=(seed>>>0)||1; return function(){ s=(s*1664525+1013904223)>>>0; return s/4294967296; }; }

// map any step -> a state. A generator label (step.emotion) wins only when it
// is confident (conf>=0.5); otherwise a priority-ordered heuristic covers 100%
// of steps, so a label-less trace is still fully expressive.
function classifyStep(step){
  if(step.intro) return {id:"focus", inten:1, frust:0, labeled:false};  // the planning beat is pure focus
  var e=step.emotion;
  if(e && e.conf>=0.5 && STATE[e.state]){
    var inten=clamp((e.arousal!=null?e.arousal:STATE[e.state].arousal)/60,0.4,1.6);
    return {id:e.state, inten:inten, frust:0, labeled:true, arousal:e.arousal, valence:e.valence};
  }
  var id="focus", frust=0, c=step.content;
  switch(step.type){
    case "checkpoint": id="alert"; break;               // human steering / hard fault
    case "tool_call":  id="seek";  break;               // reaching outward
    case "tool_result":                                 // payoff vs dead-end
      var empty=(c&&c.results&&c.results.length===0)||(c&&c.result&&MISS_RE.test(c.result));
      if(empty){ id="doubt"; frust=1; } else id="synthesis";
      break;
    case "reasoning":
      var s=String(c||"");
      if(DOUBT_RE.test(s)) id="doubt";
      else if(step.final || /final|word count|confirm|complete|✔/i.test(s)) id="resolve";
      else if(/outline|rank|theme|synthesi|distinguish|conclude/i.test(s)) id="synthesis";
      else id="focus";
      break;
    default: id="focus";
  }
  return {id:id, inten:1, frust:frust, labeled:false};
}

// ================================================================= engine
function Swarmcore(trace){
  this.trace=trace;
  this.speed=1; this.playing=true;
  this.canvas=document.getElementById("face");
  this.ctx=this.canvas.getContext("2d");
  this.log=document.getElementById("log");
  this.statusEl=document.getElementById("status");
  this.clockEl=document.getElementById("clock");
  this.stage=document.getElementById("stage");
  this.sweep=document.getElementById("sweep");
  // affect instrument
  this.eeg=document.getElementById("eeg");
  this.moodEl=document.getElementById("moodWord");
  this.arEl=document.getElementById("arVal");
  this.vaEl=document.getElementById("vaVal");
  this.dotEl=document.querySelector("#terminal .thead .dot");
}

Swarmcore.prototype.start=function(){
  window.SC=this;
  // the affect console is a DEBUG instrument — viewers never see it unless
  // ?debug is in the URL (or the D key toggles it)
  if(/[?&]debug\b/.test(location.search)) document.body.classList.add("debug");
  if(/[?&]rec\b/.test(location.search)) document.body.classList.add("rec");
  document.getElementById("taskLine").innerHTML =
    "TASK ▸ <b>"+esc(this.trace.task)+"</b>";
  this.buildModel();
  this.buildWords();
  this.setupCanvas();
  this.setupEEG();
  this.bindControls();
  this.reset();

  var self=this;
  // coalesce resize: rebuilding 6 supersampled masks is heavy, so do it once
  // the drag settles (a rapid resize storm would otherwise jank the main thread).
  window.addEventListener("resize",function(){
    if(self._rz) cancelAnimationFrame(self._rz);
    self._rz=requestAnimationFrame(function(){ self._rz=0; self.setupCanvas(); self.setupEEG(); });
  });
  this._last=performance.now(); this._faceLast=0;
  function pump(){ self.tick(performance.now()); }
  (function raf(){ pump(); requestAnimationFrame(raf); })();
  setInterval(pump,33);  // keeps advancing if rAF is throttled
};

// ---- flatten the trace into a scheduled event list ----
Swarmcore.prototype.buildModel=function(){
  var events=[], self=this;
  // INTRO BEAT — the orchestrator's real extended-thinking plan opens the run
  // as its own reasoning event: a calm blue stretch of intensive thought (the
  // neck roll's home) before the swarm fans out.
  var orch=this.trace.orchestrator||{};
  // the richer of the two (extended-thinking summary vs. the visible plan)
  var pt=orch.planning_text||"", px=orch.plan_text||"";
  var planTxt=px.length>pt.length?px:pt;
  this._introEnd=0;
  if(planTxt.length>=80){
    events.push({ai:1, role:"orchestrator",
      step:{type:"reasoning", content:planTxt, intro:true}, dur:3400});
    this._introEnd=3400;   // head assembles + rolls its neck through the plan
  }
  this.trace.subagents.forEach(function(ag,ai){
    ag.steps.forEach(function(step){
      var dur = step.type==="checkpoint" ? DUR.checkpoint
              : (step.type==="reasoning" && step.final) ? DUR.reasoningFinal
              : DUR[step.type] || 1000;
      // long thoughts HOLD longer (up to +1.5s) — honest pacing, and it gives
      // the intensive-thinking neck roll room to complete
      if(step.type==="reasoning" && !step.final)
        dur += clamp((String(step.content||"").length-250)*0.7, 0, 1500);
      events.push({ai:ai, role:ag.role, step:step, dur:dur});
    });
  });
  var t=0; events.forEach(function(ev){ ev.start=t; t+=ev.dur; });
  this.events=events;
  this.total=t;
  this.loopEnd=t+END_HOLD;
  this.nAgents=this.trace.subagents.length;
};

// ---- words scattered into the field (drawn from the real trace) ----
Swarmcore.prototype.buildWords=function(){
  var pool={};
  var add=function(s){ (String(s).toUpperCase().match(/[A-Z]{4,14}/g)||[])
    .forEach(function(w){ pool[w]=1; }); };
  add(this.trace.task); add("SWARMCORE ORCHESTRATOR RESEARCH ANALYZE WRITE CORE AGENT");
  this.trace.subagents.forEach(function(ag){
    ag.steps.forEach(function(s){
      if(s.type==="tool_call") add(s.content.name+" "+JSON.stringify(s.content.input));
      else if(s.type==="reasoning") add(s.content);
      else if(s.type==="checkpoint") add("STEERING CHECKPOINT "+s.content.tool);
    });
  });
  var arr=Object.keys(pool).filter(function(w){return w.length>=4;});
  // stable-ish shuffle
  for(var i=arr.length-1;i>0;i--){ var j=(i*7+13)%(i+1); var t=arr[i];arr[i]=arr[j];arr[j]=t; }
  this.words=arr.slice(0,90);
};

// ---- canvas + grid + procedural face-luminance mask ----
Swarmcore.prototype.setupCanvas=function(){
  var c=this.canvas, r=c.getBoundingClientRect();
  var dpr=Math.min(window.devicePixelRatio||1, 2);
  this.W=Math.max(320,r.width); this.H=Math.max(320,r.height);
  c.width=Math.round(this.W*dpr); c.height=Math.round(this.H*dpr);
  this.ctx.setTransform(dpr,0,0,dpr,0,0);

  // dense grid — the portrait is carried entirely by per-character brightness,
  // so it needs enough glyphs across the face to hold real tonal detail
  this.cellW=Math.max(7, this.W/104);
  this.cellH=this.cellW*1.08;                 // tight vertical packing = tonal coverage
  this.cols=Math.ceil(this.W/this.cellW);
  this.rows=Math.ceil(this.H/this.cellH);
  this.fontPx=this.cellH*1.00;
  this._burstMaxR=Math.max(this.cols,this.rows)*0.34;

  this.buildMasks();
  this.initGrid();
};

// small offscreen EEG canvas (bus + rolling waveform) — one extra surface
Swarmcore.prototype.setupEEG=function(){
  var c=this.eeg; if(!c) return;
  var dpr=Math.min(window.devicePixelRatio||1,2);
  this.eegW=176; this.eegH=64;
  c.style.width=this.eegW+"px"; c.style.height=this.eegH+"px";
  c.width=Math.round(this.eegW*dpr); c.height=Math.round(this.eegH*dpr);
  this.ectx=c.getContext("2d"); this.ectx.setTransform(dpr,0,0,dpr,0,0);
};

// Paint a head/face on a small canvas for one EXPRESSION and read luminance per
// grid cell. The head is a SKETCHED PORTRAIT of a woman, not a blob-field: a
// soft-oval silhouette framed by long dark hair, with smooth tonal shading and
// drawn features (arched brows, winged almond eyes with iris + glint, full
// sculpted lips) softened only slightly — so the downsample yields a portrait
// whose characters stay crisp and readable.
// All geometry is in face-fraction coords via a canvas transform: fx∈[-.5,.5]
// across the head, fy∈[0..1] crown→shoulders; anatomy holds at any aspect.
Swarmcore.prototype.buildMaskFor=function(expr){
  var cols=this.cols, rows=this.rows, cw=this.cellW, chh=this.cellH;
  var SS=4, MW=cols*SS, MH=rows*SS;              // 4x SUPERSAMPLE → smooth curves
  var m=document.createElement("canvas"); m.width=MW; m.height=MH;
  var x=m.getContext("2d");
  x.fillStyle="#000"; x.fillRect(0,0,MW,MH);

  var Hp=this.H, Wp=this.W, cxp=Wp*0.5, ASPECT=0.78;
  var fH=Hp*0.92, fW=fH*ASPECT;
  if(fW > Wp*0.96){ fW=Wp*0.96; fH=fW/ASPECT; }
  var top=(Hp-fH)*0.5;
  var sxT=fW/cw*SS, syT=fH/chh*SS, oxT=cxp/cw*SS, oyT=top/chh*SS;

  var e=expr;
  var roll=e.headRoll||0, ht=e.headTilt||0, hn=e.headTurn||0;
  // ctx.filter blur is in DEVICE px (ignores the transform) → radii in face units
  function BL(f){ x.filter = f>0 ? "blur("+(f*sxT).toFixed(1)+"px)" : "none"; }
  function ink(v,a){ var g=Math.round(v*255); return "rgba("+g+","+g+","+g+","+a+")"; }
  // head transform: roll about the NECK pivot (0,0.62) — the neck bends, the
  // shoulders stay. Features add tilt/turn about the face centre (0,0.42).
  function headXf(){ x.setTransform(sxT,0,0,syT,oxT,oyT);
    x.translate(0,0.62); x.rotate(roll); x.translate(0,-0.62); }
  function featXf(){ headXf();
    x.translate(hn,0.42); x.rotate(ht); x.translate(0,-0.42); }
  function ell(cx,cy,rx,ry,style){ x.fillStyle=style; x.beginPath();
    x.ellipse(cx,cy,rx,ry,0,0,6.2832); x.fill(); }

  // ---- head silhouette: soft oval — smooth high crown, tapered jaw, small
  // rounded chin. Feminine proportions carry the portrait even at glyph
  // resolution: width lives at the cheekbones, never the jaw. -------------
  headXf(); BL(0.012);
  x.beginPath();
  x.moveTo(-0.272,0.300);
  x.bezierCurveTo(-0.272,0.100,-0.150,0.045, 0,0.045);
  x.bezierCurveTo( 0.150,0.045, 0.272,0.100, 0.272,0.300);
  x.bezierCurveTo( 0.272,0.400, 0.256,0.462, 0.224,0.522);
  x.bezierCurveTo( 0.163,0.618, 0.078,0.668, 0,0.682);
  x.bezierCurveTo(-0.078,0.668,-0.163,0.618,-0.224,0.522);
  x.bezierCurveTo(-0.256,0.462,-0.272,0.400,-0.272,0.300);
  x.closePath();
  var hg=x.createLinearGradient(0,0.05,0,0.70);
  hg.addColorStop(0.00, ink(0.58,1)); hg.addColorStop(0.30, ink(0.70,1));
  hg.addColorStop(0.62, ink(0.66,1)); hg.addColorStop(1.00, ink(0.54,1));
  x.fillStyle=hg; x.fill();

  // HAIR — what makes her HER at forty glyphs across: a centre-parted dark
  // cap and two slim curtains hugging the face to just past the jaw (a long
  // bob), tapering to soft tips. Dark mass (the face stays the bright thing);
  // a couple of quiet strand highlights, no long spaghetti streaks.
  BL(0.010);
  x.beginPath();                                               // crown + curtain
  x.moveTo(-0.298,0.335);
  x.bezierCurveTo(-0.310,0.070,-0.170,0.005, 0,0.005);
  x.bezierCurveTo( 0.170,0.005, 0.310,0.070, 0.298,0.335);
  x.bezierCurveTo( 0.288,0.250, 0.238,0.200, 0.186,0.192);
  x.bezierCurveTo( 0.096,0.180, 0.030,0.196, 0.008,0.148);     // sweep to the part
  x.bezierCurveTo(-0.030,0.196,-0.096,0.180,-0.186,0.192);
  x.bezierCurveTo(-0.238,0.200,-0.288,0.250,-0.298,0.335);
  x.closePath(); x.fillStyle=ink(0.34,0.97); x.fill();
  for(var hf=0; hf<2; hf++){                                   // face-hugging curtains
    var sgH=hf?1:-1;
    x.beginPath();
    x.moveTo(sgH*0.236,0.210);
    x.bezierCurveTo(sgH*0.306,0.290, sgH*0.316,0.430, sgH*0.298,0.560);  // outer edge
    x.bezierCurveTo(sgH*0.288,0.650, sgH*0.264,0.720, sgH*0.226,0.760);  // to the tip
    x.bezierCurveTo(sgH*0.216,0.700, sgH*0.226,0.640, sgH*0.238,0.560);  // inner edge
    x.bezierCurveTo(sgH*0.254,0.460, sgH*0.256,0.360, sgH*0.236,0.210);
    x.closePath(); x.fillStyle=ink(0.42,0.95); x.fill();
  }
  x.lineCap="round"; BL(0.008);
  for(var hs=0; hs<2; hs++){                                   // one quiet shine arc per side
    var sgS=hs?1:-1;
    x.strokeStyle=ink(0.48,0.55); x.lineWidth=0.012;
    x.beginPath(); x.moveTo(sgS*0.030,0.085);
    x.quadraticCurveTo(sgS*0.150,0.075, sgS*0.238,0.195); x.stroke();
    x.strokeStyle=ink(0.50,0.5); x.lineWidth=0.009;            // curtain strand
    x.beginPath(); x.moveTo(sgS*0.252,0.280);
    x.quadraticCurveTo(sgS*0.288,0.440, sgS*0.252,0.700); x.stroke();
  }
  x.strokeStyle=ink(0.12,0.9); x.lineWidth=0.008;              // the centre part
  x.beginPath(); x.moveTo(0,0.010); x.lineTo(0.006,0.150); x.stroke();

  // no torso: a short neck stub that fades to black just below the jaw — the
  // portrait is a FACE, not a bust (the old shoulder slab read as a blob)
  x.setTransform(sxT,0,0,syT,oxT,oyT); BL(0.02);
  var ng=x.createLinearGradient(0,0.64,0,0.86);
  ng.addColorStop(0,ink(0.34,1)); ng.addColorStop(0.55,ink(0.24,0.8)); ng.addColorStop(1,ink(0,0));
  x.fillStyle=ng; x.fillRect(-0.048,0.640,0.096,0.22);
  headXf(); BL(0.025);
  ell(0,0.720,0.080,0.022, ink(0,0.40));                       // jaw shadow on the throat

  // ---- tonal volume: smooth + luminous — soft cheek apples, no hollows -----
  var chR=e.cheekRaise||0;
  BL(0.06);
  ell(0,0.262,0.150,0.075, ink(1,0.13));                       // forehead light
  ell(-0.262,0.360,0.048,0.120, ink(0,0.14));                  // temple falloff
  ell( 0.262,0.360,0.048,0.120, ink(0,0.14));
  ell(-0.146,0.502-chR*0.014,0.060,0.040, ink(1,0.12+0.13*chR)); // cheek apples
  ell( 0.146,0.502-chR*0.014,0.060,0.040, ink(1,0.12+0.13*chR));
  ell(-0.196,0.438,0.052,0.024, ink(1,0.10+0.07*chR));         // cheekbone sheen
  ell( 0.196,0.438,0.052,0.024, ink(1,0.10+0.07*chR));
  ell(-0.232,0.565,0.042,0.062, ink(0,0.13));                  // jawline slimming shadow
  ell( 0.232,0.565,0.042,0.062, ink(0,0.13));
  ell(0,0.612,0.032,0.019, ink(1,0.11));                       // chin light
  BL(0.045);
  ell(-0.163,0.408,0.100,0.042, ink(0,0.10));                  // gentle orbit shaping
  ell( 0.163,0.408,0.100,0.042, ink(0,0.10));

  // ---- features (small blur → crisp shapes after the downsample) ----------
  featXf();
  var asym=e.asym||0;
  var brow=e.browY||0, tilt=e.browTilt||0, thick=e.browThick||0.5, furrow=e.furrow||0;
  var lidU=e.lidUpper||0, lidL=e.lidLower||0;
  var eyeXf=0.163, eyeYf=0.402+brow*0.6;
  var eyeHalf=Math.max(0.006, 0.024*(e.eyeOpen||1)*(1-0.62*lidU));
  var eyeWHalf=0.078*(e.eyeW||1);
  var gzX=e.gazeX||0, gzY=e.gazeY||0;

  // nose — slim ridge, small refined tip (feature-space, tilts with the face)
  BL(0.03);
  x.fillStyle=ink(1,0.13); x.fillRect(-0.009,0.352,0.018,0.128);  // ridge light
  ell(0,0.490,0.021,0.013, ink(1,0.15));                          // tip light
  BL(0.012);
  ell(0,0.516,0.033,0.009, ink(0,0.26));                          // base shadow
  ell(-0.023,0.510,0.008,0.006, ink(0,0.42));                     // nostrils
  ell( 0.023,0.510,0.008,0.006, ink(0,0.42));

  // brows — slender high arches peaking at the outer third; +tilt raises the
  // OUTER end (arch), − the INNER (worry)
  BL(0.006); x.fillStyle=ink(0.10,0.95);
  for(var si=0; si<2; si++){
    var sgn=si?1:-1;
    var by=0.330+brow + (si? -asym*0.008 : asym*0.008);
    var byI=by+tilt*0.048, byO=by-tilt*0.058, byM=(byI+byO)*0.5-0.014;
    var th=0.010+0.012*thick;
    x.beginPath();
    x.moveTo(sgn*0.072, byI-th*0.40);
    x.quadraticCurveTo(sgn*0.190, byM-th*0.90, sgn*0.256, byO-th*0.10);
    x.lineTo(sgn*0.256, byO+th*0.30);
    x.quadraticCurveTo(sgn*0.190, byM+th*0.60, sgn*0.072, byI+th*0.60);
    x.closePath(); x.fill();
  }
  if(furrow>0){                                    // glabella crease (worry/knit)
    x.fillStyle=ink(0,0.42*furrow);
    x.fillRect(-0.031,0.350+brow,0.012,0.044);
    x.fillRect( 0.019,0.350+brow,0.012,0.044);
  }

  // eyes — wide almonds with a LIFTED outer corner, winged lash line, bright
  // sclera and a luminous iris: an eye, not a skull socket. sg orients the
  // wing so inner→outer reads correctly on both sides.
  function eyePath(ex,ey,wh,up,lo,sg){
    var x0=ex-sg*wh, x1=ex+sg*wh;                  // inner corner → outer corner
    x.beginPath();
    x.moveTo(x0, ey+0.004);
    x.quadraticCurveTo(ex, ey-up*2, x1, ey-0.007); // cat-eye lift at the outer end
    x.quadraticCurveTo(ex, ey+lo*2, x0, ey+0.004);
    x.closePath();
  }
  for(var sj=0; sj<2; sj++){
    var sg=sj?1:-1, exf=sg*eyeXf, eyf=eyeYf+(sj? asym*0.006 : -asym*0.006);
    var up=eyeHalf, lo=eyeHalf*0.78*(1-0.55*lidL);
    // smoky shadow field — a tilted soft mass that lifts toward the temple;
    // THIS is what reads as "her eyes" at glyph scale
    BL(0.014);
    x.save(); x.translate(exf, eyf-0.006); x.rotate(-sg*0.10);
    ell(0,0,eyeWHalf*1.08,0.020+up*0.8, ink(0.16,0.38));
    x.restore();
    BL(0.006);
    x.strokeStyle=ink(1,0.16); x.lineWidth=0.010;  // under-brow highlight
    x.beginPath(); x.moveTo(exf-sg*eyeWHalf*0.7, eyf-0.042);
    x.quadraticCurveTo(exf+sg*eyeWHalf*0.2, eyf-0.052, exf+sg*eyeWHalf*1.05, eyf-0.038); x.stroke();
    eyePath(exf,eyf,eyeWHalf,up,lo,sg);
    x.fillStyle=ink(0.36,0.95); x.fill();          // shadowed almond
    x.strokeStyle=ink(0,0.55); x.lineWidth=0.009;  // liner ring around the almond
    eyePath(exf,eyf,eyeWHalf,up,lo,sg); x.stroke();
    if(lidU<0.6){
      x.save(); eyePath(exf,eyf,eyeWHalf,up,lo,sg); x.clip();
      var ix=exf+gzX*0.026, iy=eyf+gzY*0.014;
      BL(0.004);
      ell(ix,iy,0.0250,0.0250, ink(0.95,1));       // luminous iris
      ell(ix,iy,0.0080,0.0080, ink(0.05,1));       // pupil
      BL(0);
      ell(ix-0.007,iy-0.007,0.0050,0.0050, ink(1,0.95)); // glint
      x.restore();
    }
    BL(0.005); x.strokeStyle=ink(0.04,0.95); x.lineWidth=0.010; // lash line + wing
    x.beginPath(); x.moveTo(exf-sg*eyeWHalf, eyf+0.004);
    x.quadraticCurveTo(exf, eyf-up*2, exf+sg*eyeWHalf, eyf-0.007);
    x.lineTo(exf+sg*(eyeWHalf+0.018), eyf-0.018); x.stroke();
    if(chR>0.2){                                   // Duchenne lower-lid light
      x.strokeStyle=ink(1,0.28*chR); x.lineWidth=0.006;
      x.beginPath(); x.moveTo(exf-sg*eyeWHalf*0.8, eyf+lo*1.9);
      x.quadraticCurveTo(exf, eyf+lo*2.5, exf+sg*eyeWHalf*0.8, eyf+lo*1.9); x.stroke();
    }
  }

  // mouth — full sculpted lips with a crisp cupid's bow; the LOWER lip carries
  // the light. Corners lift by mouthCurve.
  var mc=e.mouthCurve||0, mo=e.mouthOpen||1, mwF=e.mouthWidth||1, jd=e.jawDrop||0;
  var mY=0.576+jd*0.035, mHalf=0.094*mwF;
  var cY=mY+mc*0.9, kY=mY-mc*0.9, kYr=kY-asym*0.006;   // right corner cheats up
  // on a frown the LIP corners droop only 55% as far as the contact line, and
  // the bow hangs a FIXED distance above the higher of centre/corners — the
  // lip keeps a constant thickness whichever way the mouth curves (otherwise
  // a frown's bow-to-corner fill becomes a tall dark slab).
  var kYu=(mc<0)? mY-mc*0.9*0.55 : kY, kYru=kYu-asym*0.006;
  var lipTop=Math.min(cY,kYu)-0.020;
  BL(0.006);
  x.fillStyle=ink(0.20,0.95);                          // upper lip (defined bow)
  x.beginPath();
  x.moveTo(-mHalf,kYu);
  x.quadraticCurveTo(0, cY+0.005, mHalf, kYru);
  x.quadraticCurveTo(mHalf*0.55, lipTop, 0.020, lipTop+0.004);
  x.quadraticCurveTo(0, lipTop+0.012, -0.020, lipTop+0.004);  // cupid's bow
  x.quadraticCurveTo(-mHalf*0.55, lipTop, -mHalf, kYu);
  x.closePath(); x.fill();
  x.fillStyle=ink(0.52,0.88);                          // FULL lower lip
  x.beginPath();
  x.moveTo(-mHalf*0.94, kY+0.002);
  x.quadraticCurveTo(0, cY+0.004, mHalf*0.94, kYr+0.002);
  x.quadraticCurveTo(mHalf*0.60, cY+0.040*mo, 0, cY+0.044*mo);
  x.quadraticCurveTo(-mHalf*0.60, cY+0.040*mo, -mHalf*0.94, kY+0.002);
  x.closePath(); x.fill();
  x.strokeStyle=ink(0.05,0.9); x.lineWidth=0.009;      // lip contact line
  x.beginPath(); x.moveTo(-mHalf,kY);
  x.quadraticCurveTo(0, cY+0.006, mHalf, kYr); x.stroke();
  if(mo>1.22 || jd>0.10)                               // parted lips / speech gap
    ell(0, cY+0.010, mHalf*0.55, 0.010+0.018*Math.max(0,mo-1)+0.05*jd, ink(0.05,0.9));
  BL(0.02);
  ell(0, mY+0.060, 0.048, 0.011, ink(0,0.25));         // under-lip shadow
  ell(0, cY+0.026, 0.040, 0.009, ink(1,0.45));         // lower-lip catch light
  if(mc>0.03){ var nf=Math.min(1,mc*12);               // nasolabial hint on a smile
    x.strokeStyle=ink(0,0.11*nf); x.lineWidth=0.009;
    x.beginPath(); x.moveTo(-0.048,0.508); x.quadraticCurveTo(-0.098,0.540,-0.110,0.572); x.stroke();
    x.beginPath(); x.moveTo( 0.048,0.508); x.quadraticCurveTo( 0.098,0.540, 0.110,0.572); x.stroke();
  }

  // etched CIRCUIT TRACE — one delicate machine "scar" down the right cheek;
  // a quiet engraving with node dots. She is still made of the machine.
  BL(0.003);
  x.strokeStyle=ink(0.95,0.24); x.lineWidth=0.0045;
  x.beginPath(); x.moveTo(0.212,0.470); x.lineTo(0.212,0.520);
  x.lineTo(0.188,0.552); x.lineTo(0.188,0.600); x.stroke();
  ell(0.212,0.470,0.0045,0.0045, ink(1,0.40));
  ell(0.188,0.600,0.005,0.005, ink(1,0.42));

  // ---- vignette + read-back ------------------------------------------------
  x.setTransform(1,0,0,1,0,0); x.filter="none";
  var vcx=cxp/cw*SS, vcy=(top+0.42*fH)/chh*SS, vr=fH/chh*SS;
  var vg=x.createRadialGradient(vcx,vcy,vr*0.16, vcx,vcy,vr*1.02);
  vg.addColorStop(0,"rgba(0,0,0,0)"); vg.addColorStop(0.7,"rgba(0,0,0,0)");
  vg.addColorStop(1,"rgba(0,0,0,0.95)");
  x.fillStyle=vg; x.fillRect(0,0,MW,MH);

  // stash centroid + head half-extents + eye centres (flight paths and the
  // geometric "words never render over the head" gate)
  this.faceCX=cxp; this.faceCY=top+0.42*fH;
  this.faceRX=fW*0.42; this.faceRY=fH*0.36;
  var rc=Math.cos(roll), rs=Math.sin(roll), ct=Math.cos(ht), stt=Math.sin(ht);
  function toStage(fx,fy){
    var px=hn + fx*ct-(fy-0.42)*stt, py=0.42 + fx*stt+(fy-0.42)*ct; // feature tilt/turn
    var qx=px*rc-(py-0.62)*rs, qy=0.62 + px*rs+(py-0.62)*rc;        // head roll
    return {x:cxp+qx*fW, y:top+qy*fH};
  }
  this._eyeC=[toStage(-eyeXf,eyeYf), toStage(eyeXf,eyeYf)];

  // BOX-DOWNSAMPLE each SSxSS block (avg red) → gentle contrast shape → mask.
  // The curve is soft ON PURPOSE: the portrait needs its midtones (that's where
  // the shading lives); only the near-black floor is clipped away.
  var img=x.getImageData(0,0,MW,MH).data, out=new Float32Array(cols*rows);
  for(var r=0;r<rows;r++){
    for(var c=0;c<cols;c++){
      var acc=0;
      for(var yy=0;yy<SS;yy++){ var off=((r*SS+yy)*MW + c*SS)*4;
        for(var xx=0;xx<SS;xx++) acc+=img[off+xx*4]; }
      var v=acc/(SS*SS)/255;
      out[r*cols+c]=clamp((v-0.08)/0.72, 0, 1);
    }
  }
  return out;
};

// build one mask per emotional expression; the live `this.mask` eases between them
Swarmcore.prototype.buildMasks=function(){
  var cols=this.cols, rows=this.rows;
  this.masks={};
  for(var k in EXPR){ if(EXPR.hasOwnProperty(k)) this.masks[k]=this.buildMaskFor(EXPR[k]); }
  // neck-roll keyframes (intensive thinking) — a full slow circle of the head
  var eyeC=this._eyeC;                       // keep the NEUTRAL eye centres for the blink map
  this.rollMasks=[];
  for(var rk=0;rk<ROLL_KEYS;rk++) this.rollMasks.push(this.buildMaskFor(rollExpr(rk/ROLL_KEYS)));
  this._eyeC=eyeC;
  // seed from the ACTIVE state (not focus) so a mid-run resize keeps the
  // expression matched to the colour; falls back to focus on first setup.
  var cur=(this.curStateId && this.masks[this.curStateId]) || this.masks.focus;
  this.mask=cur.slice();                // live, eased mask
  this.maskT=cur;                       // current target expression

  // bright "brain band" cells per vertical third → keyword landing targets
  var fm=this.masks.focus;
  this.zoneTargets=[[],[],[]];
  var r0=Math.max(1,Math.floor(rows*0.18)), r1=Math.floor(rows*0.46);
  for(var rr=r0;rr<r1;rr++){
    for(var cc=1;cc<cols-1;cc++){
      if(fm[rr*cols+cc]>0.5){
        var zz=(cc*3/cols)|0; if(zz>2)zz=2;
        this.zoneTargets[zz].push({col:cc,row:rr});
      }
    }
  }
  for(var z=0;z<3;z++){ if(!this.zoneTargets[z].length){
    var mc=Math.floor(cols*(z+0.5)/3), mr=Math.floor(rows*0.32);
    this.zoneTargets[z].push({col:clamp(mc,1,cols-2),row:mr}); } }
};

Swarmcore.prototype.initGrid=function(){
  var cols=this.cols, rows=this.rows, n=cols*rows;
  this.ch=new Array(n);
  this.phase=new Float32Array(n);   // reveal ordering
  this.jit=new Float32Array(n);     // per-cell shimmer phase
  this.gboost=new Float32Array(n);  // transient brightness where keywords imprint
  this.faceCell=new Uint8Array(n);  // 1 = part of the face (kept meaningful, not churned)
  for(var i=0;i<n;i++){
    this.ch[i]=CHARS[(Math.random()*CHARS.length)|0];
    this.phase[i]=Math.random();
    this.jit[i]=Math.random()*6.28;
  }
  // THE FACE IS MADE OF WORDS: flow the trace's real vocabulary through the ENTIRE
  // head (a low threshold, so the whole face is word-mass), in reading order. The
  // per-cell BRIGHTNESS then follows the mask — bright cheeks/forehead spell in
  // full light, the dark eyes/mouth spell dim — so the face's own light-and-shadow
  // reads as features while every lit cell is still a real trace term.
  var stream=((this.words||[]).join("·")+"·").toUpperCase();
  if(stream.length<40) stream="SWARMCORE·ORCHESTRATOR·RESEARCH·ANALYZE·WRITE·REACTOR·";
  var fm=(this.masks&&this.masks.focus)||this.mask, sp=0;
  for(var r=0;r<rows;r++){
    for(var c=0;c<cols;c++){
      var idx=r*cols+c;
      if(fm && fm[idx]>0.12){                 // whole head, not just the brightest ridges
        this.faceCell[idx]=1;
        this.ch[idx]=stream.charAt(sp%stream.length); sp++;
      }
    }
  }
}

// ---- controls ----
Swarmcore.prototype.bindControls=function(){
  var self=this;
  var bP=document.getElementById("btnPlay"),
      bR=document.getElementById("btnRestart"),
      bS=document.getElementById("btnSpeed");
  bP.onclick=function(){ self.playing=!self.playing;
    bP.textContent=self.playing?"❚❚ PAUSE":"▶ PLAY"; };
  bR.onclick=function(){ self.reset(); self.playing=true; bP.textContent="❚❚ PAUSE"; };
  bS.onclick=function(){ self.speed=self.speed===1?2:1; bS.textContent=self.speed+"×"; };

  // URL params: ?speed=2 (recording) · ?debug (affect console)
  var mSp=location.search.match(/[?&]speed=([12])\b/);
  if(mSp){ this.speed=+mSp[1]; bS.textContent=this.speed+"×"; }

  // keyboard: Space play/pause · R restart · 1/2 speed · ←/→ seek 5s · D debug
  window.addEventListener("keydown",function(e){
    if(e.metaKey||e.ctrlKey||e.altKey) return;
    if(e.code==="Space"){ e.preventDefault(); bP.onclick(); }
    else if(e.key==="r"||e.key==="R") bR.onclick();
    else if(e.key==="1"||e.key==="2"){ self.speed=+e.key; bS.textContent=self.speed+"×"; }
    else if(e.key==="d"||e.key==="D") document.body.classList.toggle("debug");
    else if(e.key==="ArrowRight"){ e.preventDefault(); self.seek(self.clock+5000); }
    else if(e.key==="ArrowLeft"){ e.preventDefault(); self.seek(self.clock-5000); }
  });

  // timeline scrubber — click or drag to jump anywhere in the run
  var sc=document.getElementById("scrub");
  this.scrubFill=sc.querySelector(".fill");
  function scrubTo(ev){ var r=sc.getBoundingClientRect();
    self.seek(clamp((ev.clientX-r.left)/r.width,0,1)*self.total); }
  function endScrub(ev){ if(self._scrubPid!==ev.pointerId) return;
    self._scrubPid=null; self._scrubbing=false; sc.classList.remove("drag"); }
  sc.addEventListener("pointerdown",function(ev){
    self._scrubbing=true; self._scrubPid=ev.pointerId; sc.classList.add("drag");
    try{ sc.setPointerCapture(ev.pointerId); }catch(_){ } scrubTo(ev); });
  sc.addEventListener("pointermove",function(ev){
    if(self._scrubbing && ev.pointerId===self._scrubPid) scrubTo(ev); });
  window.addEventListener("pointerup",endScrub);
  window.addEventListener("pointercancel",endScrub);

  // idle auto-hide: controls + cursor vanish after ~3s still (clean recording;
  // never while a scrub drag is held)
  var idleT=0;
  function wake(){ document.body.classList.remove("idle");
    clearTimeout(idleT); idleT=setTimeout(function(){
      if(!self._scrubbing) document.body.classList.add("idle"); },3200); }
  window.addEventListener("mousemove",wake);
  window.addEventListener("pointerdown",wake);
  wake();

  // drag-and-drop ANY trace.json onto the page to replay it
  window.addEventListener("dragover",function(e){ e.preventDefault(); document.body.classList.add("dragging"); });
  window.addEventListener("dragleave",function(e){ if(!e.relatedTarget) document.body.classList.remove("dragging"); });
  window.addEventListener("drop",function(e){
    e.preventDefault(); document.body.classList.remove("dragging");
    var f=e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if(!f) return;
    f.text().then(function(s){
      var tr=JSON.parse(s);
      if(!tr || !tr.subagents || !tr.orchestrator)
        throw new Error("not a SWARMCORE trace (needs orchestrator + subagents)");
      self.loadTrace(tr);
      self.toast("TRACE LOADED ▸ "+clip(tr.task,64));
    }).catch(function(err){ self.toast("✕ "+(err && err.message || err), true); });
  });
};

// jump to an absolute trace-time: rebuild terminal + state by fast-forwarding
// events with visual spawns suppressed, then snap the eased channels
Swarmcore.prototype.seek=function(ms){
  ms=clamp(ms,0,Math.max(0,this.total-1));
  var wasPlaying=this.playing;
  this._ff=true;
  try{
    this.reset();
    this.clock=ms;
    while(this.cursor<this.events.length && this.clock>=this.events[this.cursor].start){
      this.enterStep(this.events[this.cursor],this.cursor); this.cursor++;
    }
  } finally { this._ff=false; }   // a throw must never leave spawns suppressed
  this.playing=wasPlaying;
  this.reveal=this.computeReveal();
  this.core=this.coreT.slice(); this.glow=this.glowT.slice();
  this.warmth=this.warmthT; this.churnS=this.churnT; this.bHz=this.bHzT; this.bAmp=this.bAmpT;
  this.arousal=this.arousalT; this.valence=this.valenceT; this.seekS=this.seekT; this.doubtS=this.doubtT;
  this.freeze=this.freezeT; this.tremor=this.tremorT; this.frust=this.frustT;
  if(this.maskT) this.mask=this.maskT.slice();
};

Swarmcore.prototype.toast=function(msg,err){
  var t=document.getElementById("toast"); if(!t) return;
  t.textContent=msg; t.className="show"+(err?" err":"");
  clearTimeout(this._toastT);
  this._toastT=setTimeout(function(){ t.className=""; },2800);
};

// swap in a different trace at runtime (drag-and-drop player mode).
// ATOMIC: validate + build first; only commit the UI once nothing can throw,
// and roll back to the old trace if the new one is structurally broken.
Swarmcore.prototype.loadTrace=function(tr){
  if(!tr || !tr.orchestrator || !Array.isArray(tr.subagents) ||
     !tr.subagents.length ||
     !tr.subagents.every(function(a){ return a && Array.isArray(a.steps); }))
    throw new Error("not a SWARMCORE trace (needs orchestrator + subagents[].steps[])");
  var old=this.trace;
  this.trace=tr;
  try{ this.buildModel(); this.buildWords(); }
  catch(e){ this.trace=old; this.buildModel(); this.buildWords(); throw e; }
  document.getElementById("taskLine").innerHTML="TASK ▸ <b>"+esc(tr.task)+"</b>";
  this.reset(); this.playing=true;
  var bP=document.getElementById("btnPlay"); if(bP) bP.textContent="❚❚ PAUSE";
};

// ---- replay state ----
Swarmcore.prototype.reset=function(){
  this.clock=0; this.cursor=0; this.completed=false;
  this.reveal=0;
  this.zoneE=[0,0,0]; this.bursts=[]; this._cp=null;
  if(this.cols) this.initGrid();            // fresh field each loop (clears accretion)

  // ---- affect engine: eased state colour + motion scalars ----
  this.core=STATE.focus.core.slice(); this.glow=STATE.focus.glow.slice();
  this.coreT=STATE.focus.core.slice(); this.glowT=STATE.focus.glow.slice();
  this.warmth=0; this.churnS=1; this.bHz=0.8; this.bAmp=0.05;
  this.arousal=45; this.valence=0.10; this.seekS=0; this.doubtS=0;
  this.freeze=0; this.tremor=0; this.frust=0;
  this.warmthT=0; this.churnT=1; this.bHzT=0.8; this.bAmpT=0.05;
  this.arousalT=45; this.valenceT=0.10; this.seekT=0; this.doubtT=0;
  this.freezeT=0; this.tremorT=0; this.frustT=0;
  this.curStateId="focus"; this._stateSince=0; this._now=0; this._synthT=-9999;
  this._roll=null; this._rollLast=-1e9; this._revealHold=null;
  this.tokens=[]; this.pulses=[]; this.busLvl=[0,0,0,0,0,0];
  this.pendingCall=[null,null,null];        // a word exhaled per zone, awaiting its answer
  this._flareT=-1e9; this._flareMag=0;       // face "pulses back" on a returned result
  this._auroraT=-1e9;                        // resolve finale: full-wheel rainbow sweep
  if(this.masks){ this.mask=this.masks.focus.slice(); this.maskT=this.masks.focus; }
  this.eegBuf=new Float32Array(EEG_N); this.eegHead=0; this._eegPhase=0; this._eegLast=0;

  this.log.innerHTML='<span id="cursor">▮</span>';
  this.cursorEl=document.getElementById("cursor");
  this.setStatus("EXECUTING","");
  this.setEmotion("focus",1,0,true);
  // opening readout: the orchestrator's real plan
  var plan=(this.trace.orchestrator&&this.trace.orchestrator.planning_text)||"";
  this.append('<div class="line"><span class="tag t-orch">◇ ORCHESTRATOR</span> '+
    '<span class="muted">'+esc(clip(plan,240))+'</span></div>');
  var subs=(this.trace.orchestrator&&this.trace.orchestrator.subtasks)||[];
  this.append('<div class="line"><span class="tag t-orch">◇ PLAN</span> decomposed → '+
    esc(subs.map(function(s){return s.role;}).join(" · "))+'</div>');
};

Swarmcore.prototype.setStatus=function(txt,cls){
  this.statusEl.textContent=txt;
  this.statusEl.className=cls;   // layout/label only — colour comes from setEmotion
};

// ---- affect engine: set the current emotional/cognitive state ----
Swarmcore.prototype.setEmotion=function(id,inten,frust,force,arousal,valence){
  if(!STATE[id]) id="focus";
  inten=inten||1;
  // min-dwell debounce (~400ms): quick low-arousal steps don't yank the colour;
  // the higher-arousal state wins to avoid whiplash. tokens still spawn regardless.
  if(!force && this.curStateId && (this.clock-this._stateSince<400) &&
     STATE[id].arousal<=STATE[this.curStateId].arousal){ return; }
  var st=STATE[id];
  this.curStateId=id; this._stateSince=this.clock;
  this.coreT=st.core.slice(); this.glowT=st.glow.slice();
  this.warmthT=st.warmth;
  this.churnT=1+(st.churn-1)*inten + (frust?(2.2-st.churn):0);
  this.bHzT=st.bHz; this.bAmpT=st.bAmp;
  // a confident generator label supplies real arousal/valence; else use presets
  this.arousalT=(arousal!=null)?arousal:((id==="doubt"&&frust)?78:st.arousal);
  this.valenceT=(valence!=null)?valence:((id==="doubt"&&frust)?-0.55:st.valence);
  this.seekT=st.seek?1:0; this.doubtT=st.doubt?1:0;
  this.freezeT=st.freeze?1:0; this.tremorT=st.tremor?1:0; this.frustT=frust?1:0;
  var bi=BUS.indexOf(id); if(bi>=0) this.busLvl[bi]=1;   // light this bus segment
  if(this.masks && this.masks[id]) this.maskT=this.masks[id];  // morph facial expression
  // HUD readout
  var rgb="rgb("+st.core.join(",")+")";
  if(this.moodEl){ this.moodEl.textContent=st.label; this.moodEl.style.color=rgb;
    this.moodEl.style.textShadow="0 0 8px rgba("+st.core.join(",")+",.5)"; }
  if(this.arEl) this.arEl.textContent=Math.round(this.arousalT);
  if(this.vaEl){ var v=this.valenceT; this.vaEl.textContent=(v>=0?"+":"")+v.toFixed(2); }
  if(this.statusEl){ this.statusEl.style.color=rgb;
    this.statusEl.style.boxShadow="0 0 15px rgba("+st.core.join(",")+",.28) inset"; }
  if(this.dotEl){ this.dotEl.style.background=rgb;
    this.dotEl.style.boxShadow="0 0 8px "+rgb; }
};

// ease all affect channels toward their targets, once per frame (cheap)
Swarmcore.prototype.easeAffect=function(dt){
  var k=Math.min(1,dt/200);   // >=200ms eases: no hard flips (seizure-safe)
  for(var i=0;i<3;i++){ this.core[i]+=(this.coreT[i]-this.core[i])*k;
                        this.glow[i]+=(this.glowT[i]-this.glow[i])*k; }
  this.warmth+=(this.warmthT-this.warmth)*k;
  this.churnS+=(this.churnT-this.churnS)*k;
  this.bHz+=(this.bHzT-this.bHz)*k; this.bAmp+=(this.bAmpT-this.bAmp)*k;
  this.arousal+=(this.arousalT-this.arousal)*k; this.valence+=(this.valenceT-this.valence)*k;
  this.seekS+=(this.seekT-this.seekS)*k; this.doubtS+=(this.doubtT-this.doubtS)*k;
  this.freeze+=(this.freezeT-this.freeze)*k; this.tremor+=(this.tremorT-this.tremor)*k;
  this.frust+=(this.frustT-this.frust)*k;
};

// ---- main tick ----
Swarmcore.prototype.tick=function(now){
  var dt=now-this._last; this._last=now;
  if(dt<0)dt=0; if(dt>200)dt=200;
  this._now=now;
  if(this.playing){ this.clock += dt*this.speed; }

  while(this.cursor<this.events.length && this.clock>=this.events[this.cursor].start){
    this.enterStep(this.events[this.cursor], this.cursor); this.cursor++;
  }
  if(!this.completed && this.clock>=this.total){ this.onComplete(); }
  if(this.clock>=this.loopEnd){ this.reset(); }

  // face materializes as the run advances; holds full for the last ~28%.
  this.reveal = this.computeReveal();
  this.checkpointTypewriter();

  // ease affect channels + zone glow
  this.easeAffect(dt);
  for(var z=0;z<3;z++) this.zoneE[z]*=Math.pow(0.9,dt/60);
  // event-synced animations advance on CLOCK time (dt*speed) so the emit→pending→
  // return pairing holds at any playback speed; the event clock is scaled the same.
  var sdt=dt*this.speed;
  // age bursts
  var kept=[]; for(var b=0;b<this.bursts.length;b++){
    this.bursts[b].age+=sdt; if(this.bursts[b].age<this.bursts[b].life) kept.push(this.bursts[b]); }
  this.bursts=kept;
  // age keyword tokens + decay imprint glow + bus afterglow
  if(this.playing) this.ageTokens(sdt);
  if(this.gboost){ var gd=Math.pow(0.90,dt/33), gb=this.gboost;
    for(var gi=0;gi<gb.length;gi++){ if(gb[gi]>0.002) gb[gi]*=gd; else if(gb[gi]) gb[gi]=0; } }
  if(this.busLvl){ var bd=Math.pow(0.985,dt/16);
    for(var bl=0;bl<6;bl++) this.busLvl[bl]*=bd;
    var cur=BUS.indexOf(this.curStateId); if(cur>=0) this.busLvl[cur]=1; }
  // NECK ROLL (intensive thinking): step the mask target around the keyframe
  // circle; cancelled the instant the state leaves focus (setEmotion re-targets).
  if(this._roll){
    var rollOK=(this.curStateId==="focus"||this.curStateId==="synthesis");
    if(!rollOK || !this.rollMasks || !this.rollMasks.length){ this._roll=null; }
    else{
      var rp=(this.clock-this._roll.t0)/ROLL_MS;
      if(rp>=1){ this._roll=null; this.maskT=this.masks[this.curStateId]||this.masks.focus; }
      else{ this.maskT=this.rollMasks[Math.min((rp*ROLL_KEYS)|0, ROLL_KEYS-1)]; }
    }
  }
  // ease the facial EXPRESSION (mask morph) toward the current state; a touch
  // faster mid-roll so the circling head reads as motion, not a crossfade
  if(this.maskT && this.mask){ var mk=Math.min(1,dt/(this._roll?170:300)), lm=this.mask, tm=this.maskT;
    for(var mi=0;mi<lm.length;mi++) lm[mi]+=(tm[mi]-lm[mi])*mk; }
  // age tool pulses (clock time, frozen while paused, like tokens)
  if(this.playing && this.pulses && this.pulses.length){ var pk=[];
    for(var pi=0;pi<this.pulses.length;pi++){ this.pulses[pi].age+=sdt;
      if(this.pulses[pi].age<this.pulses[pi].life) pk.push(this.pulses[pi]); }
    this.pulses=pk; }

  this.renderClock();

  // draw the character field ~34fps
  if(now-this._faceLast>28){ this._faceLast=now; this.drawFace(now); }
  // EEG waveform ~20fps
  if(now-this._eegLast>48){ this._eegLast=now; this.drawEEG(); }
};

// the face's emergence-from-noise curve, shared by tick() and seek() so a
// scrubbed frame matches a played one. A sqrt ramp keeps the head legible early
// (so the neck-roll + every emote read) while still being born from noise; the
// intro and the checkpoint get a reveal FLOOR so those signature head moves —
// the neck roll and the curious tilt — are never lost in static.
Swarmcore.prototype.computeReveal=function(){
  if(this._revealHold!=null) return this._revealHold;   // capture/verify hold
  var denom=this.total*0.72;
  var r=denom>0 ? Math.pow(clamp(this.clock/denom,0,1), 0.5) : 1;  // guard a zero-length trace
  // INTRO FLOOR — the head assembles to ~0.6 by 70% of the planning beat and then
  // HOLDS there for the rest of the run (ip clamps at 1). Because both this floor
  // and the base ramp are monotonic in clock, reveal never snaps back into noise
  // — no cliff when the intro ends. Stateless, so a scrub is consistent with play.
  if(this._introEnd){
    var ip=smooth(clamp(this.clock/(this._introEnd*0.7),0,1));
    if(ip*0.60>r) r=ip*0.60;
  }
  if(this.curStateId==="alert"){                        // AWAITING INPUT: lift the tilt to read
    var af=smooth(clamp((this.clock-(this._stateSince||0))/500,0,1));
    var floor=0.62+0.10*af; if(floor>r) r=floor;
  }
  return clamp(r,0,1);
};

Swarmcore.prototype.renderClock=function(){
  var ms=Math.min(this.clock,this.total), s=ms/1000;
  this.clockEl.textContent =
    String(Math.floor(s/60)).padStart(2,"0")+":"+(s%60).toFixed(1).padStart(4,"0");
  if(this.scrubFill){
    // total (not loopEnd) so the fill maps 1:1 to the pointer→seek fraction
    var fw=this.total>0 ? clamp(this.clock/this.total,0,1) : 0;
    this.scrubFill.style.width=(fw*100).toFixed(2)+"%";
    this.scrubFill.style.background="rgb("+(this.core[0]|0)+","+(this.core[1]|0)+","+(this.core[2]|0)+")";
  }
};

Swarmcore.prototype.onComplete=function(){
  this.completed=true;
  this.setStatus("COMPLETE","done");
  this.setEmotion("resolve",1,0,true);   // crystallize + hold through END_HOLD
  this._auroraT=this._now;               // flash the whole run's palette across the face
  this.flareOn(1.4);                     // then bloom to gold
  this.glitch();
  this.append('<div class="line"><span class="out">◈ RUN COMPLETE — '+this.nAgents+
    ' agents · face resolved from trace</span></div>');
};

// ---- react to a replayed step ----
Swarmcore.prototype.enterStep=function(ev, idx){
  var role=ev.role, step=ev.step, zone=ev.ai%3;
  if(!this._ff) this.zoneE[zone]=1;                    // light the active agent's zone

  // classify -> emotional state -> keyword intake
  var cls=classifyStep(step);
  this.setEmotion(cls.id, cls.inten, cls.frust, this._ff===true,
                  cls.labeled?cls.arousal:null, cls.labeled?cls.valence:null);
  if(!this._ff && cls.id==="synthesis") this._synthT=this._now;  // insight bloom (never on a scrub)
  // INTENSIVE THINKING → a slow neck roll: a genuinely long, non-final
  // reasoning step (a compose/synthesize thought, not a one-line intent) makes
  // the head circle about the neck (rate-limited; cancelled by outward states).
  if(!this._ff && step.type==="reasoning" && !step.final &&
     (this.curStateId==="focus"||this.curStateId==="synthesis") &&
     (step.intro || String(step.content||"").length>=500) &&
     this.clock-(this._rollLast||-1e9)>5000){
    this._roll={t0:this.clock}; this._rollLast=this.clock;
  }
  var si=(idx==null?this.cursor:idx), st=STATE[this.curStateId]||STATE.focus;

  // ---- EMIT / RETURN call-and-response (the mind reaches OUT, the answer comes BACK) ----
  // skipped wholesale during a seek fast-forward (this._ff) — no stale flights
  if(!this._ff){
    if(step.type==="tool_call"){
      this.spawnEmit(ev, si);                           // exhale the action word outward
      this.spawnPulse(zone, step.content.name, toolColor(step.content.name), "call");
      this.burst(zone, 1.0, false);                     // face reaches out (outward ring)
    }
    else if(step.type==="tool_result"){
      var r0=step.content;
      var miss = (cls.id==="doubt") ||
        (r0 && ((r0.results && r0.results.length===0) || (r0.result && MISS_RE.test(r0.result))));
      this.spawnReturn(ev, si, !!miss);                // inhale the answer home (flare on landing)
      this.spawnPulse(zone, r0.name||"result", toolColor(r0.name), "return");
      this.burst(zone, 0.8, true);                      // convergence
    }
    else if(step.type==="reasoning") this.spawnMurmur(ev, si); // idle thought: a small outward breath
    else if(step.type==="checkpoint") this.spawnEmit(ev, si, "STEERING");
  }

  if(step.type==="reasoning"){
    this.setStatus("EXECUTING","");
    if(step.intro){ /* the plan is already printed by reset() — no double log */ }
    else if(step.final)
      this.append('<div class="line"><span class="tag t-'+role+'">▸'+role.toUpperCase()+
        '</span> <span class="out">✔ OUTPUT</span> '+esc(clip(step.content,320))+'</div>');
    else
      this.append('<div class="line"><span class="tag t-'+role+'">▸'+role.toUpperCase()+
        '</span> <span class="muted">'+esc(clip(step.content,300))+'</span></div>');
  }
  else if(step.type==="tool_call"){
    this.setStatus("EXECUTING","");
    var inp=JSON.stringify(step.content.input);
    this.append('<div class="line"><span class="tag t-'+role+'">▸'+role.toUpperCase()+
      '</span> <span class="call">⟐ CALL '+esc(step.content.name)+'</span> '+esc(clip(inp,120))+'</div>');
  }
  else if(step.type==="tool_result"){
    var r=step.content, txt;
    if(r.results){ txt=r.results.length+' sources · '+
      r.results.slice(0,2).map(function(x){return clip(x.title||x.url,40);}).join(" ┃ "); }
    else txt=clip(r.result||"",150);
    this.append('<div class="line"><span class="tag t-'+role+'">▸'+role.toUpperCase()+
      '</span> <span class="result">◀ '+esc(r.name||"result")+' </span> '+esc(txt)+'</div>');
  }
  else if(step.type==="checkpoint"){
    this.enterCheckpoint(ev);
  }
};

Swarmcore.prototype.burst=function(zone,strong,collapse){
  // burst centered on this agent's third of the face
  var fx=(zone+0.5)/3;
  this.bursts.push({ x:fx*this.cols, y:this.rows*(0.30+Math.random()*0.34),
    age:0, life:900, strong:strong, collapse:!!collapse });
  if(this.bursts.length>8) this.bursts.shift();
};

// ============================================================ action pulses
// Labeled expanding rings, coloured by TOOL identity — the original design,
// restored: web_search ice-blue, knowledge_lookup violet, steering amber.
// Several tools in flight = several hues alive at once, layered over the one
// travelling state hue of the face. PULSE = which tool · FACE = how it feels.
Swarmcore.prototype.spawnPulse=function(zone,label,color,kind){
  if(!this.pulses) this.pulses=[];
  var cx=(zone+0.5)/3*this.W;
  var cy=(this.faceCY||this.H*0.42) + Math.sin(this.pulses.length*1.7)*this.H*0.04;
  this.pulses.push({ x:cx, y:cy, age:0, life:1250,
    color:color||TOOL_COLORS._default, label:String(label||"tool").toUpperCase(), kind:kind });
  if(this.pulses.length>6) this.pulses.shift();
};

Swarmcore.prototype.drawPulses=function(){
  var ctx=this.ctx, ps=this.pulses; if(!ps||!ps.length) return;
  var maxR=Math.min(this.W,this.H)*0.30;
  for(var i=0;i<ps.length;i++){
    var p=ps[i], a=p.age/p.life; if(a>=1) continue;
    var c=p.color, fade=(1-a), R=c[0]|0,G=c[1]|0,B=c[2]|0;
    var rad=8 + smooth(a)*maxR;
    // expanding double ring
    ctx.strokeStyle="rgba("+R+","+G+","+B+","+(0.5*fade).toFixed(3)+")";
    ctx.lineWidth=1.6; ctx.beginPath(); ctx.arc(p.x,p.y,rad,0,6.2832); ctx.stroke();
    ctx.strokeStyle="rgba("+R+","+G+","+B+","+(0.22*fade).toFixed(3)+")";
    ctx.lineWidth=1; ctx.beginPath(); ctx.arc(p.x,p.y,rad*0.62,0,6.2832); ctx.stroke();
    // label rises + fades
    var sz=Math.max(11,this.fontPx*1.15);
    ctx.font="bold "+sz.toFixed(1)+"px "+FONT;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    var pre=(p.kind==="return"||p.kind==="result")?"◀ ":(p.kind==="steer")?"✎ ":"⟐ ";
    var ly=p.y - a*this.H*0.06;
    ctx.fillStyle="rgba(4,6,12,"+(0.5*fade).toFixed(3)+")";      // dark plate for legibility
    ctx.fillText(pre+p.label, p.x+0.8, ly+0.8);
    ctx.fillStyle="rgba("+R+","+G+","+B+","+(0.96*fade).toFixed(3)+")";
    ctx.fillText(pre+p.label, p.x, ly);
    ctx.textAlign="left"; ctx.textBaseline="top";
  }
};

// ============================================================ keyword intake
// Pick the salient keyword(s) for a step (tool names, argument values, source
// titles, domain terms) — these are what "enter the head".
Swarmcore.prototype.pickTokens=function(step){
  var out=[], seen={};
  function push(s){
    if(s==null) return; s=String(s).toUpperCase().replace(/[^A-Z0-9_]/g,"");
    if(s.length<4) return; if(s.length>12) s=s.slice(0,12);
    if(STOPWORDS[s]||seen[s]) return; seen[s]=1; out.push(s);
  }
  function harvest(str,cap){ (String(str).toUpperCase().match(/[A-Z][A-Z0-9_]{3,11}/g)||[])
    .slice(0,cap||99).forEach(push); }
  var c=step.content;
  if(step.type==="tool_call"){
    push(c && c.name);
    var inp=(c&&c.input)||{}; for(var k in inp) harvest(inp[k],3);
  } else if(step.type==="tool_result"){
    if(c && c.results && c.results.length){
      push(c.results.length+"SRC");
      c.results.slice(0,3).forEach(function(x){ harvest(x.title||x.url,2); });
    } else if(c && c.result){ harvest(c.result,3); }
  } else if(step.type==="checkpoint"){
    var o=(c&&c.original_input)||{}, e=(c&&c.edited_input)||{};
    Object.keys(o).forEach(function(k){ harvest(o[k],2); });   // what it WAS
    Object.keys(e).forEach(function(k){ harvest(e[k],2); });   // what it BECAME
  } else { harvest(c,4); }
  if(!out.length && this.words && this.words.length)         // never starve
    out.push(this.words[this.cursor%this.words.length]);
  var maxN = step.type==="reasoning"?2 : step.type==="tool_result"?4 : step.type==="checkpoint"?2 : 3;
  return out.slice(0,maxN);
};

Swarmcore.prototype.pickSpawn=function(zone,rnd){
  var W=this.W,H=this.H;                     // enter from the edge nearest the agent's third
  if(zone===0) return {x:-W*0.03, y:H*(0.18+rnd()*0.6)};
  if(zone===2) return {x:W*1.03,  y:H*(0.18+rnd()*0.6)};
  return {x:W*(0.2+rnd()*0.6), y:-H*0.04};
};

Swarmcore.prototype.pickTarget=function(zone,rnd,len){
  var list=this.zoneTargets[zone], cols=this.cols;
  if(list && list.length){
    for(var tries=0;tries<6;tries++){
      var t=list[(rnd()*list.length)|0];
      var col=Math.max(1, t.col-((len/2)|0));
      if(col+len < cols-1) return {col:col, row:t.row};
    }
    var t0=list[0];
    return {col:clamp(t0.col,1,cols-len-1), row:t0.row};
  }
  return {col:1+((this.cols-len-2)*rnd()|0), row:2+((this.rows-4)*rnd()|0)};
};

// EMIT — the mind EXHALES its action word OUTWARD to a rim anchor (tool_call).
Swarmcore.prototype.spawnEmit=function(ev, stepIndex, forceWord){
  var toks = forceWord ? [String(forceWord).toUpperCase()] : this.pickTokens(ev.step);
  if(!toks.length) return;
  var zone=ev.ai%3, st=STATE[this.curStateId]||STATE.focus;
  // the flying ACTION word carries WHICH tool (identity hue); murmurs stay state-coloured
  var idCol = forceWord ? TOOL_COLORS.steering
            : (ev.step.type==="tool_call" && ev.step.content) ? toolColor(ev.step.content.name)
            : st.pulse;
  var idGlow = toolGlow(idCol);
  var live=0; for(var q=0;q<this.tokens.length;q++) if(!this.tokens[q].landed) live++;
  for(var k=0;k<toks.length;k++){
    if(live>=INTAKE_MAX) break; live++;
    var rnd=lcg(stepIndex*131 + k*997 + 17);
    var edge=this.pickSpawn(zone,rnd);                     // rim = DESTINATION now
    var ox=(zone+0.5)/3*this.W, oy=this.faceCY + (rnd()-0.5)*this.H*0.06; // origin AT the face
    this.tokens.push({
      text:toks[k], dir:"emit", murmur:false, dead:false, primary:(k===0), steer:!!forceWord,
      sx:ox, sy:oy, tx:edge.x, ty:edge.y,
      cx:lerp(ox,edge.x,0.5)+(rnd()-0.5)*this.W*0.10, cy:lerp(oy,edge.y,0.5)-this.H*0.05,
      age:0, life:900, delay:k*120, zone:zone, landed:false,
      color:idCol.slice(), glow:idGlow.slice()
    });
  }
};

// RETURN — the answer INHALES back from the pending rim anchor to a face cell,
// imprints, and (on success) makes the whole face FLARE (tool_result).
Swarmcore.prototype.spawnReturn=function(ev, stepIndex, dead){
  var toks=this.pickTokens(ev.step); if(!toks.length) return;
  var zone=ev.ai%3, st=STATE[this.curStateId]||STATE.focus, pend=this.pendingCall[zone];
  // the ANSWER inhales in the hue of the tool that fetched it
  var idCol=(ev.step.content && ev.step.content.name) ? toolColor(ev.step.content.name) : st.pulse;
  var idGlow=toolGlow(idCol);
  var live=0; for(var q=0;q<this.tokens.length;q++) if(!this.tokens[q].landed) live++;
  for(var k=0;k<toks.length;k++){
    if(live>=INTAKE_MAX) break; live++;
    var rnd=lcg(stepIndex*131 + k*997 + 17);
    var edge = pend ? {x:pend.x,y:pend.y} : this.pickSpawn(zone,rnd);   // rim = ORIGIN now
    var tg=this.pickTarget(zone,rnd,toks[k].length);                    // face cell = DEST
    this.tokens.push({
      text:toks[k], dir:"return", murmur:false, dead:!!dead, scramble:!!dead,
      sx:edge.x, sy:edge.y, tcol:tg.col, trow:tg.row, tx:tg.col*this.cellW, ty:tg.row*this.cellH,
      cx:lerp(edge.x,this.faceCX,0.5)+(rnd()-0.5)*this.W*0.06, cy:lerp(edge.y,this.faceCY,0.5),
      age:0, life:820, delay:k*110, zone:zone, landed:false,
      color:idCol.slice(), glow:idGlow.slice()
    });
  }
  this.pendingCall[zone]=null;                              // the call has been answered
};

// MURMUR — a reasoning step: a small outward breath that fades before the rim.
Swarmcore.prototype.spawnMurmur=function(ev, stepIndex){
  var toks=this.pickTokens(ev.step); if(!toks.length) return;
  var zone=ev.ai%3, st=STATE[this.curStateId]||STATE.focus, rnd=lcg(stepIndex*131 + 17);
  var ox=(zone+0.5)/3*this.W, oy=this.faceCY + (rnd()-0.5)*this.H*0.05, edge=this.pickSpawn(zone,rnd);
  var tx=lerp(ox,edge.x,0.40), ty=lerp(oy,edge.y,0.40);
  this.tokens.push({ text:toks[0], dir:"emit", murmur:true, dead:false,
    sx:ox, sy:oy, tx:tx, ty:ty, cx:lerp(ox,tx,0.5), cy:lerp(oy,ty,0.5)-this.H*0.03,
    age:0, life:520, delay:0, zone:zone, landed:false, color:st.pulse.slice(), glow:st.glow.slice() });
};

// the face "pulses back" — a whole-portrait luminous inhale on a returned result
Swarmcore.prototype.flareOn=function(mag){ this._flareT=this._now; this._flareMag=mag||1; };

// advance tokens; emits hang at the rim (pending), returns IMPRINT + flare on arrival
Swarmcore.prototype.ageTokens=function(dt){
  var keep=[];
  for(var i=0;i<this.tokens.length;i++){
    var tk=this.tokens[i];
    if(tk.delay>0){ tk.delay-=dt; keep.push(tk); continue; }
    tk.age+=dt;
    if(!tk.landed && tk.age>=tk.life){
      tk.landed=true;
      if(tk.dir==="return"){ this.landToken(tk); if(!tk.dead) this.flareOn(0.9); }
      else if(tk.dir==="emit" && !tk.murmur && !tk.steer){
        // the word HANGS at the rim (with its label) until its answer returns
        this.pendingCall[tk.zone]={x:tk.tx,y:tk.ty,color:tk.color,label:tk.primary?tk.text:null};
      }
    }
    if(!tk.landed || tk.age < tk.life+200) keep.push(tk);
  }
  this.tokens=keep;
};

// imprint a RETURNED word into the word-face (or scramble it, on a dead-end)
Swarmcore.prototype.landToken=function(tk){
  var col=tk.tcol, row=tk.trow, txt=tk.text, cols=this.cols;
  if(row>=0 && row<this.rows){
    for(var q=0;q<txt.length;q++){
      var cc=col+q; if(cc<1||cc>=cols-1) continue;
      var idx=row*cols+cc;
      if(tk.scramble){ this.ch[idx]=CHARS[(Math.random()*CHARS.length)|0]; }  // failed integration
      else { this.ch[idx]=txt[q]; this.gboost[idx]=Math.min(0.8,(this.gboost[idx]||0)+0.5); }
    }
  }
};

// draw in-flight tokens: emit=ease-OUT exhale, return=ease-IN inhale, +launch tracer
Swarmcore.prototype.drawTokens=function(){
  var ctx=this.ctx, toks=this.tokens; if(!toks.length) return;
  ctx.textBaseline="top";
  for(var i=0;i<toks.length;i++){
    var tk=toks[i]; if(tk.delay>0 || tk.landed) continue;
    var a=clamp(tk.age/tk.life,0,1), ret=(tk.dir==="return");
    var pe = ret ? a*a : 1-(1-a)*(1-a);                  // inhale vs exhale easing
    var mt=1-pe;
    var x=mt*mt*tk.sx + 2*mt*pe*tk.cx + pe*pe*tk.tx;
    var y=mt*mt*tk.sy + 2*mt*pe*tk.cy + pe*pe*tk.ty;
    var size=this.fontPx*(ret?lerp(1.18,1.0,pe):lerp(0.95,1.18,pe));
    ctx.font=size.toFixed(1)+"px "+FONT;
    // the flying word NEVER renders over the head: a GEOMETRIC gate keys
    // visibility to distance from the head ellipse — an emit MATERIALIZES as it
    // leaves the head, a return DISSOLVES at the boundary (the imprint glow +
    // flare take over inside). Viewport-independent, unlike a path fraction.
    var bri = ret ? 0.95 : tk.murmur ? 0.8*Math.max(0,1-Math.max(0,pe-0.6)/0.4) : (1-0.20*pe);
    var ndx=(x-this.faceCX)/(this.faceRX||1), ndy=(y-this.faceCY)/(this.faceRY||1);
    var nd=Math.sqrt(ndx*ndx+ndy*ndy);
    bri*=clamp((nd-(tk.murmur?0.45:0.62))/(tk.murmur?0.25:0.30),0,1);
    if(tk.dead) bri*=(a<0.62?1:Math.max(0,1-(a-0.62)/0.35))*0.7;   // dead-end scatters before centre
    var mixW = ret ? pe*0.85 : 0.15;
    var R=lerp(tk.color[0],tk.glow[0],mixW)|0,
        G=lerp(tk.color[1],tk.glow[1],mixW)|0,
        B=lerp(tk.color[2],tk.glow[2],mixW)|0;
    var txt=tk.text, kern=size*0.62;
    var ux=tk.tx-tk.sx, uy=tk.ty-tk.sy, ul=Math.sqrt(ux*ux+uy*uy)||1; ux/=ul; uy/=ul;
    for(var e=2;e>=0;e--){                                // echoes trail behind the motion
      var ea=(e===0)?0.95*bri:[0,0.28,0.14][e]*bri;
      var ex=x-ux*e*7, ey=y-uy*e*7;
      ctx.fillStyle="rgba("+R+","+G+","+B+","+ea.toFixed(3)+")";
      for(var q=0;q<txt.length;q++) ctx.fillText(txt[q], ex+q*kern, ey);
    }
  }
};

// draw the affect instrument: F·S·Y·D·A·R bus (with afterglow) + EEG waveform
// — debug-only; skipped entirely (buffer and all) while the console is hidden
Swarmcore.prototype.drawEEG=function(){
  var x=this.ectx; if(!x) return;
  if(!document.body.classList.contains("debug")) return;
  var W=this.eegW, H=this.eegH;
  // advance one waveform sample from the eased affect scalars
  var ar=this.arousal/100;
  this._eegPhase += 0.15+ar*0.5;
  var base=Math.sin(this._eegPhase);
  var noise=this.doubtS*(Math.random()-0.5)*1.3;                 // doubt = jitter
  var spike=(this.warmth>0.3 && Math.sin(this._eegPhase*3)>0.6)  // alert = spikes
              ? Math.random()*this.warmth : 0;
  var amp=(0.15+ar*0.78)*(1-0.72*this.freeze);                   // resolve flattens
  var sample=clamp(base*amp + noise*0.5 + spike, -1.2, 1.2);
  this.eegBuf[this.eegHead]=sample; this.eegHead=(this.eegHead+1)%EEG_N;

  x.clearRect(0,0,W,H);
  // ---- bus F·S·Y·D·A·R : active lit, prior states keep a decaying afterglow ----
  var bw=W/6, by=6;
  x.textAlign="center"; x.textBaseline="middle";
  for(var i=0;i<6;i++){
    var col=STATE[BUS[i]].core, lv=this.busLvl[i], cx=i*bw+bw/2;
    var a=(0.16+0.84*lv).toFixed(3);
    x.fillStyle="rgba("+col[0]+","+col[1]+","+col[2]+","+a+")";
    x.font="bold 10px "+FONT;
