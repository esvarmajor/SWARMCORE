    x.fillText(STATE[BUS[i]].ch, cx, by+5);
    x.shadowColor="rgba("+col[0]+","+col[1]+","+col[2]+","+(0.6*lv)+")"; x.shadowBlur=6*lv;
    x.fillRect(i*bw+3, by+15, bw-6, 1.5+2.5*lv);
    x.shadowBlur=0;
  }
  x.textAlign="left";
  // ---- rolling EEG waveform, coloured by the live state ----
  var wy0=30, wh=H-wy0-4, mid=wy0+wh/2;
  var c0=this.core[0]|0, c1=this.core[1]|0, c2=this.core[2]|0;
  x.strokeStyle="rgba("+c0+","+c1+","+c2+",0.15)"; x.lineWidth=1;
  x.beginPath(); x.moveTo(2,mid); x.lineTo(W-2,mid); x.stroke();
  x.strokeStyle="rgba("+c0+","+c1+","+c2+",0.92)"; x.lineWidth=1.2;
  x.beginPath();
  for(var s=0;s<EEG_N;s++){
    var v=this.eegBuf[(this.eegHead+s)%EEG_N];
    var px=2+s/(EEG_N-1)*(W-4), py=mid - v*(wh/2-1);
    if(s===0) x.moveTo(px,py); else x.lineTo(px,py);
  }
  x.stroke();
};

// ---- checkpoint: amber face + sweep + typewriter ----
Swarmcore.prototype.enterCheckpoint=function(ev){
  var c=ev.step.content, ag=ev.role;
  this.setStatus("AWAITING INPUT","await");
  if(!this._ff){
    this.glitch();
    this.burst(ev.ai%3, 1.4);
    this.spawnPulse(ev.ai%3, c.tool||"steering", TOOL_COLORS.steering, "steer");
    this.sweep.classList.remove("run"); void this.sweep.offsetWidth; this.sweep.classList.add("run");
  }

  var lines=[
    "▓▓ HUMAN STEERING CHECKPOINT ▓▓  ["+ag.toUpperCase()+"]",
    "SIMULATED — not a model action (simulated_steering:true)",
    "TOOL      : "+c.tool,
    "ORIGINAL  : "+JSON.stringify(c.original_input),
    "EDITED    : "+JSON.stringify(c.edited_input),
    "RATIONALE : "+c.rationale
  ];
  var box=document.createElement("div"); box.className="cp";
  var wrap=document.createElement("div"); wrap.className="line"; wrap.appendChild(box);
  this.log.insertBefore(wrap,this.cursorEl);
  if(this._ff){   // seeking past the checkpoint: render it fully typed, no beat
    box.innerHTML=esc(lines.join("\n")).replace(/^(.*?):/gm,'<span class="k">$1</span>:');
    return;
  }
  // durations are in clock-units (this.clock already advances at dt*speed), so
  // they must NOT be re-divided by speed — that would scale the beat twice.
  this._cp={ text:lines.join("\n"), start:this.clock,
             dur:DUR.checkpoint*0.6, el:box, resumed:false };
};

Swarmcore.prototype.checkpointTypewriter=function(){
  var cp=this._cp; if(!cp) return;
  var p=clamp((this.clock-cp.start)/cp.dur,0,1);
  var typed=Math.floor(p*cp.text.length), shown=cp.text.slice(0,typed);
  cp.el.innerHTML=esc(shown).replace(/^(.*?):/gm,'<span class="k">$1</span>:')+
    (p<1?'<span style="opacity:.7">▮</span>':'');
  if(!cp.resumed && this.clock>=cp.start + DUR.checkpoint - 360){
    cp.resumed=true; this.setStatus("EXECUTING",""); this.glitch(); this._cp=null;
  }
};

// ---- terminal + glitch ----
Swarmcore.prototype.append=function(html){
  var d=document.createElement("div");
  if(html.indexOf('class="line"')>=0){ d.innerHTML=html; d=d.firstChild; }
  else { d.className="line"; d.innerHTML=html; }
  this.log.insertBefore(d,this.cursorEl);
  while(this.log.children.length>60) this.log.removeChild(this.log.firstChild);
};
Swarmcore.prototype.glitch=function(){
  var st=this.stage; st.classList.remove("glitch"); void st.offsetWidth;
  st.classList.add("glitch"); setTimeout(function(){ st.classList.remove("glitch"); },420);
};

// ============================================================ the portrait
Swarmcore.prototype.drawFace=function(now){
  var ctx=this.ctx, cols=this.cols, rows=this.rows, cw=this.cellW, chh=this.cellH;
  ctx.clearRect(0,0,this.W,this.H);
  // three WEIGHT buckets — the portrait's tone is carried by glyph coverage
  // (like the print it's modeled on): highlights are heavy+large, shadows light.
  // The font is set only when the bucket changes cell-to-cell (regions are
  // contiguous, so switches are rare and the loop stays cheap).
  var F0="400 "+(this.fontPx*0.92).toFixed(1)+"px "+FONT,
      F1="600 "+this.fontPx.toFixed(1)+"px "+FONT,
      F2="800 "+(this.fontPx*1.12).toFixed(1)+"px "+FONT, curF="";
  ctx.textBaseline="top";
  // colour strings are quantized (5-bit RGB / 6-bit A) and cached, and fillStyle
  // is only touched when the quantized colour actually changes cell-to-cell —
  // string building was the hottest line in the whole frame.
  var colStrs=this._colStrs||(this._colStrs=new Map()); var lastKey=-1;
  if(colStrs.size>2e4) colStrs.clear();

  var t=now/1000;
  var reveal=this.reveal, bursts=this.bursts, zoneE=this.zoneE;
  var core=this.core, glow=this.glow, gboost=this.gboost;
  var doubtS=this.doubtS, tremor=this.tremor, freeze=this.freeze;

  // ---- frame-level derived values (computed ONCE, not per cell) ----
  var swaps=Math.max(1,(cols*rows*0.0006*this.churnS)|0);       // churn scales w/ tension
  var fc=this.faceCell;
  for(var s2=0;s2<swaps;s2++){ var ri=(Math.random()*cols*rows)|0;
    if(fc && fc[ri]) continue;                                  // keep the face's WORDS legible
    this.ch[ri]=CHARS[(Math.random()*CHARS.length)|0]; }
  var powE=0.85+0.40*freeze;                                    // <1 lifts midtones; resolve snaps edges
  var breathG=1 + this.bAmp*Math.sin(t*6.2832*this.bHz)*reveal  // arousal-driven breath
                + (tremor>0.02 ? 0.015*Math.sin(t*13):0);       // alert: micro-tremor
  var synthBloom=0.12*Math.exp(-Math.pow((now-this._synthT)/300,2)); // insight pulse
  var flareEnv=(this._flareMag||0)*Math.exp(-Math.pow((now-(this._flareT||-1e9))/300,2)); // success "inhale"
  var auroraEnv=Math.exp(-Math.pow((now-(this._auroraT||-1e9))/650,2));  // resolve rainbow window
  var auroraOn=auroraEnv>0.004;
  var lumScale=1-0.22*this.frust;                               // frustration darkens
  var maxR=this._burstMaxR||Math.max(cols,rows)*0.34;
  // NEAR-MONOCHROME portrait: face midtones take only a restrained pull of the
  // state hue and the highlights go to paper-white — every glyph stays readable.
  // The saturated state colour lives in the AMBIENT FIELD and the pulses instead.
  var mid=[lerp(238,core[0],0.45), lerp(241,core[1],0.45), lerp(245,core[2],0.45)];

  // ---- PHOSPHOR BACKFILL — a crisp cell-aligned fill behind the lit face.
  // Glyphs only cover ~25% of a cell, so without this the portrait can never
  // read at a distance; a per-cell rect (no blur, follows the mask exactly, so
  // eyes/mouth stay dark) lifts patch luminance like a CRT afterglow while the
  // characters stay fully legible on top.
  var mm=this.mask, bfB=(1+0.6*flareEnv+0.5*synthBloom)*reveal;
  for(var bi=0; bi<cols*rows; bi++){
    var bf=mm[bi]*bfB;
    if(bf<=0.30) continue;
    var bA=((bf-0.30)*0.26*63)|0; if(bA<2) continue;
    var bKey=(1<<22)|((mid[0]>>3)<<16)|((mid[1]>>3)<<11)|((mid[2]>>3)<<6)|bA;
    if(bKey!==lastKey){
      var bs=colStrs.get(bKey);
      if(!bs){ bs="rgba("+(mid[0]&~7)+","+(mid[1]&~7)+","+(mid[2]&~7)+","+(bA/63).toFixed(3)+")"; colStrs.set(bKey,bs); }
      ctx.fillStyle=bs; lastKey=bKey;
    }
    ctx.fillRect((bi%cols)*cw, ((bi/cols)|0)*chh, cw+0.5, chh+0.5);
  }

  for(var r=0;r<rows;r++){
    var yy=r*chh, ry=r/rows;
    for(var c=0;c<cols;c++){
      var i=r*cols+c;
      var face=this.mask[i];
      // per-cell reveal ordering → face emerges from noise
      var cr=clamp((reveal - this.phase[i]*0.80)/0.2, 0, 1);
      // strong non-linear lift so the LIT FACE pops off the dim field: the more
      // "face" a cell is, the harder it brightens.
      var lit=face*cr*breathG;
      var g = lit*(0.90+0.50*face);
      // HEAD-SILHOUETTE GATE — the ambient code-field runs full strength OUTSIDE
      // the head, but is suppressed INSIDE it, so the dark features (eyes, mouth)
      // read as clean holes instead of noise. This is what makes it a FACE and
      // not a head-shaped word-blob.
      var hx=(c*cw+cw*0.5-this.faceCX)/(this.faceRX*1.16);
      var hy=(yy+chh*0.5-this.faceCY)/(this.faceRY*1.12);
      var inHead=clamp(1.12-(hx*hx+hy*hy),0,1)*reveal;
      g=Math.max(g, (0.022+0.027*Math.sin(t*2.0+this.jit[i]))*(1-0.92*inHead)); // ambient field, gated
      // active-agent zone glow — face-weighted so it never fills the holes
      var zone=(c*3/cols)|0; if(zone>2)zone=2;
      g += 0.14*zoneE[zone]*face;
      // bursts — a soft radial BLOOM centred on the active zone (SEEK grows out,
      // SYNTH gathers in). A wide gaussian, not a hard ring, so it reads as the
      // face breathing rather than a sci-fi shockwave sweeping the glyphs.
      for(var b=0;b<bursts.length;b++){
        var bu=bursts[b], a=bu.age/bu.life;
        var dx=c-bu.x, dy=r-bu.y, d2=dx*dx+dy*dy;
        var spread=bu.collapse ? (0.5+0.5*a) : (1.2-0.7*a);     // in vs out
        var bloom=Math.exp(-d2/(maxR*maxR*spread*spread))*(1-a)*bu.strong;
        g += bloom*0.32*(0.5+face);                             // favours the lit face
      }
      // synthesis insight bloom (face-weighted, brief)
      if(synthBloom>0.002) g += synthBloom*face;
      // success FLARE — the whole portrait breathes IN when a result returns home
      if(flareEnv>0.002) g += flareEnv*face*0.55;
      // keyword imprint glow (fades over ~700ms)
      g += gboost[i];
      g=clamp(g*lumScale,0,1.4);
      var alpha=0.05+0.95*Math.pow(Math.min(g,1),powE);
      // colour: ambient cells keep the eased STATE hue; face cells ride the
      // paper ramp (tinted midtone → white highlight) so the portrait stays
      // near-monochrome and READABLE — the hue never floods the face.
      var fw=clamp(face*1.9-0.05,0,1)*cr;
      var hi=clamp((g-0.42)/0.58,0,1);
      var f=hi*0.80+flareEnv*0.20; if(f>1)f=1;
      var R=lerp(lerp(core[0],mid[0],fw),251,f)|0,
          G=lerp(lerp(core[1],mid[1],fw),252,f)|0,
          B=lerp(lerp(core[2],mid[2],fw),254,f)|0;
      // RESOLVE finale — the run's palette sweeps across the face by column
      if(auroraOn){
        var ph=(c/cols)*5, i0=ph|0; if(i0>4)i0=4; var fr=ph-i0, A0=AURORA[i0], A1=AURORA[i0+1];
        var aw=auroraEnv*0.55;
        R=lerp(R, A0[0]+(A1[0]-A0[0])*fr, aw)|0;
        G=lerp(G, A0[1]+(A1[1]-A0[1])*fr, aw)|0;
        B=lerp(B, A0[2]+(A1[2]-A0[2])*fr, aw)|0;
      }
      // DOUBT: ember furrow in the shadows (brow/eyes) — a cast, not a flood
      if(doubtS>0){
        var w=doubtS*(face<0.55 ? (0.55-face)*2.0 : 0.14); if(w>1)w=1;
        R=lerp(R,EMBER[0],w*0.42)|0; G=lerp(G,EMBER[1],w*0.32)|0; B=lerp(B,EMBER[2],w*0.30)|0;
      }
      // DOUBT shudder: per-cell x jitter once the face has formed (kept small —
      // legibility beats drama)
      var aQ=(alpha*63)|0;
      if(aQ<5 && face<0.08) continue;      // invisible ambient cell: skip the draw
      var xoff=(doubtS>0.02 && reveal>=0.5) ? doubtS*0.16*cw*Math.sin(t*7+this.jit[i]) : 0;
      var wantF=(face>0.55&&g>0.55)?F2:(g>0.25?F1:F0);
      if(wantF!==curF){ ctx.font=wantF; curF=wantF; }
      var key=((R>>3)<<16)|((G>>3)<<11)|((B>>3)<<6)|aQ;
      if(key!==lastKey){
        var cs=colStrs.get(key);
        if(!cs){ cs="rgba("+(R&~7)+","+(G&~7)+","+(B&~7)+","+(aQ/63).toFixed(3)+")"; colStrs.set(key,cs); }
        ctx.fillStyle=cs; lastKey=key;
      }
      ctx.fillText(this.ch[i], c*cw+xoff, yy);
    }
  }

  // overlays: keywords flying into the head, then the tool pulses
  this.drawTokens();
  this.drawPulses();
};

// ------------------------------------------------------------------ start
// Prefer the LIVE trace.json when served over HTTP (always fresh after a
// regen — no stale browser-cached script), and fall back to the trace-data.js
// global for file:// use (where fetch() is blocked by the browser).
function loadFallbackScript(onDone){
  var s=document.createElement("script"); s.src="trace-data.js";
  s.onload=function(){ onDone(window.SWARMCORE_TRACE||null); };
  s.onerror=function(){ onDone(null); };
  document.head.appendChild(s);
}
if (location.protocol==="file:"){
  loadFallbackScript(function(tr){
    if(tr) boot(tr);
    else showError(new Error("could not load trace-data.js (file:// mode)."));
  });
} else {
  fetch("trace.json",{cache:"no-store"}).then(function(r){
    if(!r.ok) throw new Error("HTTP "+r.status); return r.json();
  }).then(boot).catch(function(){
    loadFallbackScript(function(tr){
      if(tr) boot(tr);
      else showError(new Error("could not load trace.json or trace-data.js. "+
        "Open via a static server, or (re)generate the trace."));
    });
  });
}

})();
</script>
